<title>Procesos</title>
<style>
:root{--bg:#0f0f0f;--bg2:#1a1a1a;--bg3:#242424;--bg4:#2e2e2e;--border:rgba(255,255,255,0.08);--border2:rgba(255,255,255,0.16);--text:#f0f0f0;--text2:#999;--text3:#666;--accent:#e8d5a3;--accent2:#c4a96b;--green:#4caf7d;--green-bg:rgba(76,175,125,0.12);--yellow:#f0c060;--yellow-bg:rgba(240,192,96,0.12);--red:#e05555;--red-bg:rgba(224,85,85,0.12);--blue:#6ab0e8;--radius:12px;--radius-sm:8px;--font:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:var(--font);font-size:15px}
body{display:flex;flex-direction:column;min-height:100vh}
.app-shell{display:flex;flex-direction:column;width:100%;min-height:100vh;position:relative}
@media(min-width:768px){.card{margin:0 24px 10px}.step-item{margin:0 24px 8px}.section-label{padding:20px 24px 10px}.sec-title{padding:14px 24px 8px}.cl-header{padding:0 24px 20px}.new-form{padding:0 24px}.topbar{padding:20px 24px 12px}.back-btn{padding:16px 24px 12px}.stats-bar{padding:16px 24px}}
.topbar{padding:16px 20px 10px;display:flex;align-items:center;justify-content:space-between;border-bottom:0.5px solid var(--border);background:var(--bg);position:sticky;top:0;z-index:50}
.topbar-title{font-size:18px;font-weight:700;color:var(--text);letter-spacing:-0.4px}
.topbar-sub{font-size:12px;color:var(--text3);margin-top:2px}
.bottom-nav{display:flex;background:var(--bg2);border-top:0.5px solid var(--border);position:sticky;bottom:0;z-index:50}
.bnav-btn{flex:1;padding:9px 1px 12px;display:flex;flex-direction:column;align-items:center;gap:2px;background:none;border:none;cursor:pointer;color:var(--text3);font-size:8.5px;font-family:var(--font);position:relative};position:relative}
.bnav-btn.active{color:var(--accent)}
.bnav-btn svg{width:19px;height:19px;stroke:currentColor;fill:none;stroke-width:1.6;stroke-linecap:round;stroke-linejoin:round}
.bnav-badge{position:absolute;top:6px;right:calc(50% - 18px);background:var(--red);color:#fff;font-size:9px;font-weight:700;padding:1px 5px;border-radius:10px;min-width:16px;text-align:center}
.screen{display:none;flex:1;overflow-y:auto;padding-bottom:20px}
.screen.active{display:block}
.section-label{font-size:11px;font-weight:600;letter-spacing:.07em;text-transform:uppercase;color:var(--text3);padding:18px 20px 8px}
.card{background:var(--bg2);border:0.5px solid var(--border);border-radius:var(--radius);margin:0 16px 8px;padding:14px 16px;cursor:pointer;display:flex;align-items:center;gap:12px}
.card:hover{background:var(--bg3)}
.card-icon{width:40px;height:40px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0}
.card-body{flex:1;min-width:0}
.card-title{font-size:14px;font-weight:500;color:var(--text)}
.card-sub{font-size:12px;color:var(--text2);margin-top:3px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.badge{font-size:11px;font-weight:600;padding:3px 9px;border-radius:20px;flex-shrink:0}
.badge-green{background:var(--green-bg);color:var(--green)}
.badge-yellow{background:var(--yellow-bg);color:var(--yellow)}
.badge-red{background:var(--red-bg);color:var(--red)}
.badge-gray{background:var(--bg3);color:var(--text2)}
.badge-accent{background:rgba(232,213,163,0.15);color:var(--accent)}
.prog-bar{height:3px;background:var(--bg4);border-radius:2px;overflow:hidden;margin-top:8px}
.prog-fill{height:100%;background:var(--accent);border-radius:2px;transition:width .3s}
.btn{display:inline-flex;align-items:center;gap:6px;padding:10px 16px;border-radius:var(--radius-sm);font-size:13px;font-family:var(--font);cursor:pointer;border:0.5px solid var(--border2);background:var(--bg3);color:var(--text)}
.btn:hover{background:var(--bg4)}
.btn-primary{background:var(--accent);color:#0f0f0f;border-color:transparent;font-weight:600}
.btn-primary:hover{background:var(--accent2)}
.btn-full{width:100%;justify-content:center}
.btn-sm{padding:7px 12px;font-size:12px}
.input-wrap{margin-bottom:14px}
.input-label{font-size:12px;color:var(--text2);margin-bottom:6px;display:block;font-weight:500}
.input-label .req{color:var(--red);margin-left:2px}
input[type=text],input[type=number],input[type=date],select,textarea{width:100%;padding:11px 14px;background:var(--bg3);border:0.5px solid var(--border2);border-radius:var(--radius-sm);color:var(--text);font-size:14px;font-family:var(--font);outline:none;-webkit-appearance:none;appearance:none}
input:focus,select:focus,textarea:focus{border-color:var(--accent)}
input::placeholder,textarea::placeholder{color:var(--text3)}
.back-btn{display:flex;align-items:center;gap:6px;color:var(--accent);font-size:14px;cursor:pointer;padding:14px 20px 10px;background:none;border:none;font-family:var(--font)}
.back-btn svg{width:18px;height:18px;stroke:currentColor;fill:none;stroke-width:2}
.cl-header{padding:0 20px 16px;border-bottom:0.5px solid var(--border);margin-bottom:4px}
.cl-header-title{font-size:20px;font-weight:700;letter-spacing:-0.4px}
.cl-header-sub{font-size:13px;color:var(--text2);margin-top:3px}
.partes-block{background:var(--bg3);border-radius:var(--radius-sm);padding:12px 14px;margin-bottom:10px}
.partes-title{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.06em;color:var(--text3);margin-bottom:8px}
.add-parte-btn{background:none;border:0.5px dashed var(--border2);border-radius:var(--radius-sm);padding:7px 12px;color:var(--text3);font-size:12px;cursor:pointer;width:100%;font-family:var(--font)}
.add-parte-btn:hover{color:var(--accent);border-color:var(--accent)}
.sec-group{border-top:0.5px solid var(--border);margin-top:16px}
.sec-group:first-child{border-top:none;margin-top:0}
.sec-title{font-size:10px;font-weight:700;letter-spacing:.09em;text-transform:uppercase;color:var(--text3);padding:14px 20px 8px}
.step-item{margin:0 16px 6px;background:var(--bg2);border:0.5px solid var(--border);border-radius:var(--radius);overflow:hidden}
.step-item.done{border-color:rgba(76,175,125,0.25)}
.step-item.pending{border-color:rgba(240,192,96,0.25)}
.step-item.skip{opacity:.5}
.step-main{padding:12px 14px;display:flex;gap:10px;align-items:flex-start}
.step-num{width:24px;height:24px;border-radius:50%;background:var(--bg4);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:600;color:var(--text3);flex-shrink:0}
.step-num.done{background:var(--green-bg);color:var(--green)}
.step-num.pending{background:var(--yellow-bg);color:var(--yellow)}
.step-text{flex:1;font-size:13px;line-height:1.5}
.step-text.done{text-decoration:line-through;color:var(--text3)}
.step-actions{display:flex;gap:6px;padding:0 14px 12px 48px;flex-wrap:wrap}
.step-act-btn{padding:5px 11px;font-size:12px;font-family:var(--font);border-radius:20px;border:0.5px solid var(--border2);background:var(--bg3);color:var(--text2);cursor:pointer;display:flex;align-items:center;gap:4px}
.step-act-btn:hover{background:var(--bg4)}
.step-act-btn.active-done{background:var(--green-bg);color:var(--green);border-color:rgba(76,175,125,0.3)}
.step-act-btn.active-pend{background:var(--yellow-bg);color:var(--yellow);border-color:rgba(240,192,96,0.3)}
.step-act-btn.active-skip{background:var(--bg4);color:var(--text3);border-color:transparent}
.step-note-area{padding:0 14px 10px 48px}
.step-note-area input{font-size:12px;padding:7px 10px}
.snooze-panel{display:none;padding:10px 14px 14px 48px;background:rgba(240,192,96,0.05);border-top:0.5px solid rgba(240,192,96,0.15)}
.snooze-panel.open{display:block}
.snooze-title{font-size:11px;color:var(--yellow);margin-bottom:8px;font-weight:600}
.snooze-input-wrap{display:flex;align-items:center;gap:8px;margin-bottom:8px}
.snooze-input-wrap input{width:64px;text-align:center;padding:7px 8px}
.snooze-input-wrap span{font-size:12px;color:var(--text2)}
.snooze-presets{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:10px}
.snooze-preset{padding:5px 11px;font-size:12px;border-radius:20px;border:0.5px solid rgba(240,192,96,0.25);background:transparent;color:var(--yellow);cursor:pointer;font-family:var(--font)}
.snooze-preset:hover{background:var(--yellow-bg)}
.snooze-date-preview{font-size:11px;color:var(--text2);margin-bottom:10px;min-height:16px;font-weight:500}
.empty{text-align:center;padding:60px 30px 40px;color:var(--text3)}
.empty-icon{font-size:48px;margin-bottom:12px}
.empty p{font-size:14px;line-height:1.6}
.reminder-item{display:flex;align-items:flex-start;gap:12px;padding:13px 20px;border-bottom:0.5px solid var(--border);cursor:pointer}
.reminder-item:hover{background:var(--bg2)}
.reminder-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;margin-top:4px}
.reminder-body{flex:1}
.reminder-prop{font-size:13px;font-weight:600}
.reminder-step{font-size:12px;color:var(--text2);margin-top:2px}
.reminder-when{font-size:11px;margin-top:4px;font-weight:600}
.new-form{padding:0 20px}
.loading{display:flex;align-items:center;justify-content:center;gap:10px;padding:40px 20px;color:var(--text3);font-size:13px}
.spinner{width:18px;height:18px;border:2px solid var(--border2);border-top-color:var(--accent);border-radius:50%;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.user-pill{padding:5px 14px;background:var(--bg3);border-radius:20px;font-size:12px;color:var(--accent);border:0.5px solid var(--border2);cursor:pointer;font-weight:600}
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.75);z-index:200;display:flex;align-items:flex-end;opacity:0;pointer-events:none;transition:opacity .2s}
.modal-overlay.open{opacity:1;pointer-events:all}
.modal-overlay.scroll-modal{align-items:flex-start;overflow-y:auto;padding:20px 0}
.modal-box{background:var(--bg2);border-radius:var(--radius) var(--radius) 0 0;border-top:0.5px solid var(--border2);padding:20px 20px 40px;width:100%;max-width:600px;margin:0 auto;transform:translateY(30px);transition:transform .2s}
.modal-overlay.open .modal-box{transform:translateY(0)}
.modal-overlay.scroll-modal .modal-box{border-radius:var(--radius);margin:auto;max-height:90vh;overflow-y:auto;transform:none}
.modal-title{font-size:16px;font-weight:700;margin-bottom:16px}
.modal-close-row{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px}
.sheet-status{display:flex;align-items:center;gap:6px;font-size:11px;padding:6px 16px;color:var(--text3)}
.sheet-dot{width:6px;height:6px;border-radius:50%;background:var(--green);flex-shrink:0}
.sheet-dot.error{background:var(--red)}
.sheet-dot.loading{background:var(--yellow);animation:pulse .8s ease-in-out infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
.toast{position:fixed;bottom:80px;left:50%;transform:translateX(-50%) translateY(20px);background:var(--bg3);border:0.5px solid var(--border2);border-radius:var(--radius-sm);padding:10px 18px;font-size:13px;z-index:300;opacity:0;transition:all .25s;pointer-events:none;white-space:nowrap}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
.stats-bar{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;padding:12px 16px}
.stat-box{background:var(--bg2);border:0.5px solid var(--border);border-radius:var(--radius-sm);padding:10px 12px;text-align:center}
.stat-num{font-size:22px;font-weight:700}
.stat-lbl{font-size:10px;color:var(--text3);margin-top:2px;text-transform:uppercase;letter-spacing:.04em}
.partes-display{display:flex;flex-wrap:wrap;gap:6px;margin-top:6px}
.parte-chip{background:var(--bg3);border:0.5px solid var(--border2);border-radius:20px;padding:3px 10px;font-size:11px;color:var(--text2)}
.info-box{background:rgba(232,213,163,0.08);border:0.5px solid rgba(232,213,163,0.2);border-radius:var(--radius-sm);padding:10px 14px;margin-bottom:12px;font-size:12px;color:var(--accent);line-height:1.5}
.overdue-banner{margin:10px 16px 0;background:var(--red-bg);border:0.5px solid rgba(224,85,85,0.3);border-radius:var(--radius-sm);padding:10px 14px;display:flex;align-items:center;gap:10px;cursor:pointer}
.overdue-banner span{font-size:13px;color:var(--red);flex:1}
.time-input-wrap{position:relative;width:100%}
.time-suggestions{position:absolute;top:100%;left:0;right:0;background:var(--bg3);border:0.5px solid var(--border2);border-radius:var(--radius-sm);z-index:100;display:none;max-height:200px;overflow-y:auto}
.time-suggestions.open{display:block}
.time-opt{padding:9px 14px;cursor:pointer;font-size:13px}
.time-opt:hover{background:var(--bg4)}
.ef-table{width:100%;border-collapse:collapse;margin-bottom:8px}
.ef-table th{font-size:11px;color:var(--text3);padding:4px 6px;text-align:left;font-weight:500;border-bottom:0.5px solid var(--border)}
.ef-table td{padding:3px 4px}
.ef-table input{padding:7px 10px;font-size:13px}
/* Selection mode */
.sel-bar{display:flex;align-items:center;gap:8px;padding:10px 16px;background:var(--bg2);border-bottom:0.5px solid var(--border);position:sticky;top:0;z-index:40}
.sel-bar .btn{flex-shrink:0}
.sel-count{font-size:13px;color:var(--text2);flex:1}
.sel-check{width:22px;height:22px;border-radius:6px;border:1.5px solid var(--border2);flex-shrink:0;display:flex;align-items:center;justify-content:center;cursor:pointer;background:var(--bg3)}
.sel-check.checked{background:var(--accent);border-color:var(--accent);color:#0f0f0f;font-weight:700}
.card.selectable{cursor:pointer}
.reminder-item.selectable .sel-check{margin-top:0}
/* Ficha */
.ficha-section{margin:0 16px 12px;background:var(--bg2);border:0.5px solid var(--border);border-radius:var(--radius);overflow:hidden}
.ficha-sec-head{padding:12px 14px;background:var(--bg3);font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:.05em;color:var(--accent);display:flex;justify-content:space-between;align-items:center}
.ficha-sec-body{padding:12px 14px}
.ficha-row{display:grid;gap:8px;margin-bottom:8px}
.ficha-field{margin-bottom:8px}
.ficha-field label{font-size:11px;color:var(--text3);display:block;margin-bottom:4px;text-transform:uppercase;letter-spacing:.03em}
.ficha-field input,.ficha-field select,.ficha-field textarea{font-size:13px;padding:8px 10px}
.ficha-card{background:var(--bg3);border-radius:var(--radius-sm);padding:10px;margin-bottom:8px;border:0.5px solid var(--border)}
.ficha-card-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px}
.ficha-card-title{font-size:11px;color:var(--text3);text-transform:uppercase;letter-spacing:.04em}
.urg-badge{display:inline-flex;align-items:center;gap:4px;padding:3px 8px;border-radius:12px;font-size:11px;font-weight:600}
.urg-1{background:var(--green-bg);color:var(--green)}
.urg-2{background:var(--yellow-bg);color:var(--yellow)}
.urg-3{background:var(--red-bg);color:var(--red)}
.doc-estado-tag{font-size:10px;padding:2px 7px;border-radius:10px;font-weight:600}
.doc-tenemos{background:var(--green-bg);color:var(--green)}
.doc-falta{background:var(--red-bg);color:var(--red)}
.ficha-card.removing{transition:opacity .2s;opacity:0}
.add-row-btn{background:none;border:0.5px dashed var(--border2);border-radius:var(--radius-sm);padding:8px 12px;color:var(--text3);font-size:12px;cursor:pointer;width:100%;font-family:var(--font);margin-top:4px}
.add-row-btn:hover{color:var(--accent);border-color:var(--accent)}
@media print{@page{size:A4;margin:10mm}body>*:not(#print-area){display:none!important}#print-area{display:block!important;font-family:Arial,sans-serif;font-size:10px;color:#000;padding:0}#print-area h2{font-size:14px;text-align:center;margin-bottom:8px;border-bottom:2px solid #000;padding-bottom:4px}#print-area .p-section{margin-bottom:6px;border:1px solid #ccc;padding:5px;page-break-inside:avoid}#print-area .p-section h3{font-size:10px;font-weight:bold;margin-bottom:4px;border-bottom:1px solid #eee;padding-bottom:2px}#print-area .p-row{display:flex;gap:8px;margin-bottom:2px;flex-wrap:wrap}#print-area .p-field{flex:1;min-width:80px}#print-area .p-label{font-size:8px;color:#666;text-transform:uppercase}#print-area .p-val{font-size:10px;font-weight:500;border-bottom:1px solid #ddd;min-height:14px}#print-area table{width:100%;border-collapse:collapse;margin-top:2px}#print-area th{background:#f0f0f0;font-size:9px;padding:2px 4px;border:1px solid #ddd}#print-area td{font-size:10px;padding:2px 4px;border:1px solid #ddd}}
</style>

<script>
// CONFIG
const SHEET_ID='1N6Df_cg1-WmX2HwXwh6uCL7xrUT7OcCjhz199pfYdiA';
const TABS=[{key:'captacion',gid:'966815152'},{key:'reserva',gid:'1126633349'},{key:'escrituracion',gid:'1906328336'},{key:'referido',gid:'2030526856'},{key:'modificacion',gid:'1010521982'},{key:'baja',gid:'2002116076'},{key:'renovacion',gid:'1653314650'}];
const JSONBIN_ID='6a2be721f5f4af5e29e5b9b1';
const JSONBIN_KEY='$2a$10$KiDRPsMXHs6NSaLfPi/gfu3TXHAQPOo34UpOlLN6dgbqCavMBTMmO';
const JSONBIN_URL='https://api.jsonbin.io/v3/b/'+JSONBIN_ID;
const META={captacion:{icon:'🏠',label:'Captación',color:'#1a2e1a',accent:'#4caf7d'},reserva:{icon:'📋',label:'Reserva',color:'#1a1e2e',accent:'#6ab0e8'},escrituracion:{icon:'📜',label:'Escrituración',color:'#2e2a1a',accent:'#f0c060'},referido:{icon:'👥',label:'Referido',color:'#2e1a2a',accent:'#d08ec0'},modificacion:{icon:'📉',label:'Modificación de Valor',color:'#2e1a1a',accent:'#e05555'},baja:{icon:'🔴',label:'Baja de Propiedad',color:'#2e1818',accent:'#e07755'},renovacion:{icon:'🔄',label:'Renovación de Propiedad',color:'#1a1e2e',accent:'#7ab0e8'}};
const FERIADOS=['2025-01-01','2025-03-24','2025-04-02','2025-04-18','2025-05-01','2025-05-25','2025-06-20','2025-07-09','2025-08-17','2025-10-12','2025-11-20','2025-12-08','2025-12-25','2026-01-01','2026-03-24','2026-04-02','2026-04-03','2026-05-01','2026-05-25','2026-06-19','2026-07-09','2026-08-17','2026-10-12','2026-11-20','2026-12-08','2026-12-25'];
const FERIADOS_SET=new Set(FERIADOS);
let APP={user:null,templates:{},prevTab:'home',currentInstId:null};
let shared=[];
let fichas=[];
let selMode=false;
let selected={};
let currentFichaId=null;
let dismissedReminders={};
let DOC_OPTIONS=['DNI','Escritura','Planos','Reglamento de Copropiedad','DH','Sucesión','Servicios','Impuestos','Estado Parcelario','Informes de Dom. e Inh.','Poder','Boleto Compra-Venta','Crédito Hipotecario'];
let PROF_OPTIONS=['Entidad bancaria','Abogado','Agrimensor','Escribano','Gestor'];
let TIPO_OPTIONS=['Casa','PH','Depto','Lote','Casa de barrio privado'];
let propiedades=[];
let currentPropId=null;
let PROP_OPTIONS={
  accionSeHizo:['No se hizo, se podria hacer','No se hizo, NO lo haria','Se hizo, NO se ejecuto','Se hizo, SI se ejecuto','Se hizo, se podria REHACER'],
  publico:['Familias','Parejas','Inversores','Solteros'],
  ocupacion:['Vacia','Con Propietarios','Con Inquilinos'],
  esperaCliente:['Relacion - Laboral','Relacion - Personal','Acercarme mas','Contacto','Mantenerlo como cliente - Que me de el resto de sus propiedades'],
  permuta:['Permuta','Financiacion','Permuta y Financiacion','No'],
  frecuencia:['Solo al momento del reporte','Cada 15 dias, buscar excusa'],
  reporteCada:['7 dias','15-21 dias','21-30 dias','1 mes'],
  formaEntrega:['Personal','Llamada','Whatsapp','Email'],
  reunionPresencial:['Excusa para tomar un cafe y conversar los reportes','Al momento de vencerse la autorizacion (c/ 3 meses)','Juntarse para hablar del valor de la propiedad']
};
const ACCIONES_FIJAS=['Video con Fer recorriendo propiedad','Video sin Fer recorriendo propiedad','Baja/Ajuste de precio','Re-publicar','Promocionar en redes','Ofrecimiento entre colegas','Ofrecimiento a personas de la zona','Cartel','Mejoras en la propiedad','Acciones sobre vecinos','Acciones sobre encargado'];

// STORAGE
function loadUser(){try{const u=localStorage.getItem('re_user_v3');if(u)APP.user=JSON.parse(u);}catch(e){}}
function saveUserLocal(){try{localStorage.setItem('re_user_v3',JSON.stringify(APP.user));}catch(e){}}
async function loadShared(){
  try{const r=await fetch(JSONBIN_URL+'/latest',{headers:{'X-Master-Key':JSONBIN_KEY,'X-Bin-Meta':'false'}});
    if(r.ok){const data=await r.json();
      if(Array.isArray(data)){shared=data.filter(i=>i&&i.id&&i.template&&i.name);}
      else if(data&&typeof data==='object'){
        shared=Array.isArray(data.procesos)?data.procesos.filter(i=>i&&i.id&&i.template&&i.name):[];
        fichas=Array.isArray(data.fichas)?data.fichas.filter(f=>f&&f.id):[];
        if(Array.isArray(data.docOptions)&&data.docOptions.length)DOC_OPTIONS=data.docOptions;
        if(Array.isArray(data.profOptions)&&data.profOptions.length)PROF_OPTIONS=data.profOptions;
        if(Array.isArray(data.tipoOptions)&&data.tipoOptions.length)TIPO_OPTIONS=data.tipoOptions;
        if(data.propOptions&&typeof data.propOptions==='object')Object.keys(data.propOptions).forEach(k=>{if(Array.isArray(data.propOptions[k])&&data.propOptions[k].length)PROP_OPTIONS[k]=data.propOptions[k];});
        if(Array.isArray(data.propiedades))propiedades=data.propiedades.filter(p=>p&&p.id);
        if(data.dismissedReminders)dismissedReminders=data.dismissedReminders;
      }
      try{localStorage.setItem('re_shared_backup',JSON.stringify({procesos:shared,fichas,docOptions:DOC_OPTIONS,profOptions:PROF_OPTIONS}));}catch(e){}
      return;
    }}catch(e){}
  try{const s=localStorage.getItem('re_shared_backup');if(s){const p=JSON.parse(s);if(Array.isArray(p)){shared=p.filter(i=>i&&i.id&&i.template&&i.name);}else if(p&&typeof p==='object'){shared=Array.isArray(p.procesos)?p.procesos:[];fichas=Array.isArray(p.fichas)?p.fichas:[];if(p.docOptions)DOC_OPTIONS=p.docOptions;if(p.profOptions)PROF_OPTIONS=p.profOptions;}}}catch(e){}
}
async function saveShared(){
  const payload={procesos:shared,fichas,propiedades,docOptions:DOC_OPTIONS,profOptions:PROF_OPTIONS,tipoOptions:TIPO_OPTIONS,propOptions:PROP_OPTIONS,dismissedReminders};
  const data=JSON.stringify(payload);
  try{localStorage.setItem('re_shared_backup',data);}catch(e){}
  try{await fetch(JSONBIN_URL,{method:'PUT',headers:{'Content-Type':'application/json','X-Master-Key':JSONBIN_KEY},body:data});}catch(e){}
}

// TEMPLATES
function setSheetStatus(st,txt){document.getElementById('sheet-dot').className='sheet-dot'+(st==='loading'?' loading':st==='error'?' error':'');document.getElementById('sheet-status-txt').textContent=txt;}
async function fetchTemplates(){
  setSheetStatus('loading','Sincronizando con Google Sheets...');
  APP.templates=getEmbedded();let ok=0;
  try{
    const results=await Promise.allSettled(TABS.map(async t=>{const url='https://docs.google.com/spreadsheets/d/'+SHEET_ID+'/gviz/tq?tqx=out:csv&gid='+t.gid;const r=await fetch(url);if(!r.ok)throw new Error('fail');return{key:t.key,csv:await r.text()};}));
    results.forEach(res=>{if(res.status==='fulfilled'&&parseCSV(res.value.key,res.value.csv))ok++;});
    setSheetStatus(ok?'ok':'error',ok?ok+' plantilla'+(ok>1?'s':'')+' sincronizada'+(ok>1?'s':'')+' desde Google Sheets':'Sin acceso — usando plantillas locales');
  }catch(e){setSheetStatus('error','Sin acceso — usando plantillas locales');}
}
function parseCSV(key,csv){
  if(!META[key])return false;
  const lines=csv.split('\n');const sections=[];let cur=null;
  for(const line of lines){
    const cols=[];let field='',inQ=false;
    for(let ci=0;ci<line.length;ci++){const ch=line[ci];if(ch==='"'){inQ=!inQ;}else if(ch===','&&!inQ){cols.push(field.trim());field='';}else{field+=ch;}}
    cols.push(field.trim());
    const isCheckbox=v=>/^(☐|TRUE|FALSE|true|false)$/.test(v.trim())||v.trim()===''||v.trim()==='☑';
    const textCols=cols.map((c,i)=>({i,v:c})).filter(({v})=>!isCheckbox(v)&&v.length>0);
    if(textCols.length===0)continue;
    const firstText=textCols[0].v;
    if(/^(CHECK|SI$|NO$|TAREA|NOTAS|Propiedad|Fecha|Horario|DNI|Email|Valor|Forma|¿Hay)/i.test(firstText))continue;
    const hasCheckbox=cols.slice(0,3).some(v=>isCheckbox(v)&&v.trim()!=='');
    if(hasCheckbox&&firstText.length>3){if(cur)cur.steps.push(firstText);}
    else if(firstText.length>1&&firstText.length<100){cur={label:firstText,steps:[]};sections.push(cur);}
  }
  const filtered=sections.filter(s=>s.steps.length>0);
  if(filtered.length>0){APP.templates[key]={...META[key],key,sections:filtered};return true;}
  return false;
}

// HELPERS
function addBizDays(from,days){let d=new Date(from);let n=0;while(n<days){d.setDate(d.getDate()+1);const iso=d.toISOString().slice(0,10),dow=d.getDay();if(dow!==0&&dow!==6&&!FERIADOS_SET.has(iso))n++;}return d;}
function fmtDate(ts){const d=new Date(ts);return d.toLocaleDateString('es-AR',{weekday:'short',day:'numeric',month:'short'});}
function fmtDateStr(s){if(!s)return'';const d=new Date(s+'T12:00:00');return d.toLocaleDateString('es-AR',{day:'numeric',month:'short',year:'numeric'});}
function fmtDateFull(s){if(!s)return'';const d=new Date(s+'T12:00:00');return d.toLocaleDateString('es-AR',{weekday:'long',day:'numeric',month:'long'});}
function totalSteps(tpl){return tpl.sections.reduce((a,s)=>a+s.steps.length,0);}
function doneCount(inst){return Object.values(inst.stepStatus||{}).filter(s=>s.status==='done'||s.status==='skip').length;}
function pendCount(inst){return Object.values(inst.stepStatus||{}).filter(s=>s.status==='pending').length;}
function overdueCount(inst){const now=Date.now();return Object.keys(inst.stepStatus||{}).filter(key=>{const s=inst.stepStatus[key];return s.status==='pending'&&s.snoozeUntil&&s.snoozeUntil<now&&!dismissedReminders[inst.id+'|'+key];}).length;}
function allOverdue(){
  const now=Date.now();let count=0;
  shared.filter(i=>!i.completed).forEach(inst=>{
    Object.keys(inst.stepStatus||{}).forEach(key=>{
      const s=inst.stepStatus[key];
      if(s.status==='pending'&&s.snoozeUntil&&s.snoozeUntil<now){
        const selId=inst.id+'|'+key;
        if(!dismissedReminders[selId])count++;
      }
    });
  });
  getAutoReminders().forEach(r=>{
    const selId='auto|'+r.inst.id+'|'+r.label;
    if(r.when<now&&!dismissedReminders[selId])count++;
  });
  return count;
}
function gval(id){return(document.getElementById(id)||{value:''}).value.trim();}
function toast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2800);}
function closeModal(id){document.getElementById(id).classList.remove('open');}
function getAutoReminders(){
  const rem=[];
  shared.filter(i=>!i.completed).forEach(inst=>{
    if(inst.template==='reserva'&&inst.recordatorioVencimiento)rem.push({inst,label:'Vencimiento de reserva',when:inst.recordatorioVencimiento});

let _reminderList=[];
function reminderSelId(r){
  if(r.isAuto)return 'auto|'+r.inst.id+'|'+r.label;

}
function renderReminders(){
  const el=document.getElementById('reminders-content');const now=Date.now();let overdue=[],upcoming=[];
  shared.filter(i=>!i.completed).forEach(inst=>{const tpl=APP.templates[inst.template];if(!tpl)return;tpl.sections.forEach(sec=>{sec.steps.forEach((step,si)=>{const key=sec.label+'__'+si;const st=(inst.stepStatus||{})[key];if(st&&st.status==='pending'&&st.snoozeUntil){const selId=inst.id+'|'+key;if(dismissedReminders[selId])return;const item={inst,step,snoozeUntil:st.snoozeUntil,key,isAuto:false};item.selId=selId;st.snoozeUntil<=now?overdue.push(item):upcoming.push(item);}});});});
  getAutoReminders().forEach(r=>{const selId='auto|'+r.inst.id+'|'+r.label;if(dismissedReminders[selId])return;const item={inst:r.inst,step:r.label,snoozeUntil:r.when,isAuto:true};item.selId=selId;r.when<=now?overdue.push(item):upcoming.push(item);});
  overdue.sort((a,b)=>a.snoozeUntil-b.snoozeUntil);upcoming.sort((a,b)=>a.snoozeUntil-b.snoozeUntil);
  _reminderList=overdue.concat(upcoming);
  if(!_reminderList.length){el.innerHTML='<div class="empty"><div class="empty-icon">🔔</div><p>No hay avisos activos.</p></div>';return;}
  let html='';
  if(selMode){
    const n=Object.values(selected).filter(Boolean).length;
    html+='<div class="sel-bar"><button class="btn btn-sm" onclick="toggleSelMode()">Cancelar</button><span class="sel-count">'+n+' seleccionado'+(n!==1?'s':'')+'</span>'+(n>0?'<button class="btn btn-sm" style="background:var(--green-bg);color:var(--green);border-color:rgba(76,175,125,0.3)" onclick="bulkResolve()">✓ Dar por leído</button>':'')+'</div>';
  }else{
    html+='<div style="display:flex;justify-content:space-between;align-items:center"><div class="section-label">Avisos</div><button class="btn btn-sm" style="margin-right:16px" onclick="toggleSelMode()">Seleccionar</button></div>';
  }
  const renderItem=(r,idx,color)=>{
    const stepTxt=(r.step||'').replace(/</g,'&lt;').replace(/>/g,'&gt;');
    const nameTxt=(r.inst.name||'').replace(/</g,'&lt;').replace(/>/g,'&gt;');
    if(selMode){const ck=selected[r.selId];return'<div class="reminder-item selectable" onclick="toggleSelectRem('+idx+')"><div class="sel-check'+(ck?' checked':'')+'">'+(ck?'✓':'')+'</div><div class="reminder-body"><div class="reminder-prop">'+nameTxt+'</div><div class="reminder-step">'+stepTxt+(r.isAuto?' (automático)':'')+'</div></div></div>';}
    return'<div class="reminder-item" onclick="openReminderIdx('+idx+')"><div class="reminder-dot" style="background:'+color+'"></div><div class="reminder-body"><div class="reminder-prop">'+nameTxt+'</div><div class="reminder-step">'+stepTxt+'</div><div class="reminder-when" style="color:'+color+'">'+(r.snoozeUntil<now?'Venció ':'')+fmtDate(r.snoozeUntil)+'</div></div></div>';
  };
  const overdueItems=_reminderList.filter(r=>r.snoozeUntil<=now);
  const upcomingItems=_reminderList.filter(r=>r.snoozeUntil>now);
  if(overdueItems.length){html+='<div class="section-label" style="color:var(--red)">⚠ Vencidos ('+overdueItems.length+')</div>';html+=overdueItems.map(r=>renderItem(r,_reminderList.indexOf(r),'var(--red)')).join('');}
  if(upcomingItems.length){html+='<div class="section-label">Próximos ('+upcomingItems.length+')</div>';html+=upcomingItems.map(r=>renderItem(r,_reminderList.indexOf(r),r.isAuto?'var(--accent)':'var(--yellow)')).join('');}
  el.innerHTML=html;
}

function toggleSelectRem(idx){const r=_reminderList[idx];if(!r)return;selected[r.selId]=!selected[r.selId];renderReminders();}
async function bulkResolve(){

  if(key==='baja'||key==='renovacion')inst.fecha=gval('ni-fecha');

function buildHeaderChips(inst){

  else if(inst.template==='referido'){if(inst.referidor)chips.push('<span class="parte-chip">👤 Ref: '+inst.referidor+'</span>');}

function isFichaStep(s){const t=s.toLowerCase();return t.includes('procesos en curso')||(t.includes('cargar')&&t.includes('propiedad')&&t.includes('implicados'));}
function isPropStep(s){const t=s.toLowerCase();return t.includes('completar')&&t.includes('propiedades')&&(t.includes('hoja')||t.includes('crear'));}

      const spid='sp_'+id.slice(-6)+'_'+sec.label.replace(/\W/g,'').slice(0,8)+'_'+si;

      const msgFerBtn=inst.template==='escrituracion'&&isMensajeFerStep(step)?'<button class="step-act-btn" data-inst="'+id+'" onclick="openMensajeFer(this.dataset.inst)" style="background:rgba(232,213,163,0.15);color:var(--accent);border-color:rgba(232,213,163,0.3)">📱 Mensaje Fer</button>':'';

      return'<div class="step-item '+status+'"><div class="step-main"><div class="step-num '+status+'">'+(status==='done'?'✓':status==='skip'?'—':n)+'</div><div class="step-text'+(status==='done'?' done':'')+'">'+step+'</div></div>'+snoozeTag+'<div class="step-actions"><button class="step-act-btn '+(status==='done'?'active-done':'')+'" onclick="setStep(\''+id+'\',\''+ek+'\',\'done\',\''+spid+'\')">✓ Hecho</button><button class="step-act-btn '+(status==='pending'?'active-pend':'')+'" onclick="toggleSnooze(\''+spid+'\')">⏰ Reprogramar</button><button class="step-act-btn '+(status==='skip'?'active-skip':'')+'" onclick="setStep(\''+id+'\',\''+ek+'\',\'skip\',\''+spid+'\')">— No aplica</button>'+escritBtn+msgClientesBtn+msgFerBtn+fichaBtn+propBtn+'</div><div class="snooze-panel" id="'+spid+'"><div class="snooze-title">¿Cuándo volvés a este paso?</div><div class="snooze-input-wrap"><input type="number" min="1" max="90" value="'+(st.snoozeDays||3)+'" id="'+spid+'_d" oninput="updatePreview(\''+spid+'\')"><span>días hábiles</span></div><div class="snooze-presets"><button class="snooze-preset" onclick="setPreset(\''+spid+'\',1)">Mañana</button><button class="snooze-preset" onclick="setPreset(\''+spid+'\',3)">3 días</button><button class="snooze-preset" onclick="setPreset(\''+spid+'\',5)">1 semana</button><button class="snooze-preset" onclick="setPreset(\''+spid+'\',10)">2 semanas</button><button class="snooze-preset" onclick="setPreset(\''+spid+'\',22)">1 mes</button></div><div class="snooze-date-preview" id="'+spid+'_p"></div><button class="btn btn-primary btn-sm" onclick="confirmSnooze(\''+id+'\',\''+ek+'\',\''+spid+'\')">Confirmar</button></div><div class="step-note-area"><input type="text" placeholder="Nota..." value="'+(st.note||'').replace(/"/g,'&quot;')+'" onchange="setNote(\''+id+'\',\''+ek+'\',this.value)"></div></div>';

function addEfRow(tipo,data){

  ['nombre','apellido'].forEach(field=>{const td=document.createElement('td');td.style.padding='3px 4px';const inp=document.createElement('input');inp.type='text';inp.dataset.field=field;inp.placeholder=field.charAt(0).toUpperCase()+field.slice(1);inp.value=d[field]||'';inp.style.cssText=IS;td.appendChild(inp);tr.appendChild(td);});

function renderSeguimiento(){
  const el=document.getElementById('seguimiento-content');
  const abiertas=fichas.filter(f=>f.estado!=='Cerrada');
  let html='';
  if(selMode){
    const n=Object.values(selected).filter(Boolean).length;
    html+='<div class="sel-bar"><button class="btn btn-sm" onclick="toggleSelModeSeg()">Cancelar</button><span class="sel-count">'+n+' seleccionada'+(n!==1?'s':'')+'</span>'+(n>0?'<button class="btn btn-sm" style="background:var(--green-bg);color:var(--green);border-color:rgba(76,175,125,0.3)" onclick="bulkCloseFichas()">Cerrar</button><button class="btn btn-sm" style="background:var(--red-bg);color:var(--red);border-color:rgba(224,85,85,0.2)" onclick="bulkDeleteFichas()">Eliminar</button>':'')+'</div>';
  }else{
    html+='<div style="display:flex;justify-content:space-between;align-items:center;padding-right:16px"><div class="section-label">Seguimiento de propiedades</div>'+(fichas.length?'<button class="btn btn-sm" onclick="toggleSelModeSeg()">Seleccionar</button>':'')+'</div>';
    html+='<div style="padding:0 16px 12px"><button class="btn btn-primary btn-full" onclick="newFicha()">+ Nueva ficha</button></div>';
  }
  if(!fichas.length){html+='<div class="empty"><div class="empty-icon">📑</div><p>No hay fichas de seguimiento.<br>Creá una para hacer seguimiento de propiedades post-reserva.</p></div>';el.innerHTML=html;return;}
  const cerradas=fichas.filter(f=>f.estado==='Cerrada');
  const renderFichaCard=(f)=>{
    const opColor=f.operacion==='COMPRA'?'var(--blue)':'var(--green)';
    const docFalta=(f.documentacion||[]).filter(d=>d.estado==='falta').length;
    if(selMode){const ck=selected[f.id];return'<div class="card selectable" onclick="toggleSelectFicha(\''+f.id+'\')"><div class="sel-check'+(ck?' checked':'')+'">'+(ck?'✓':'')+'</div><div class="card-body"><div class="card-title">'+(f.propiedad||'Sin nombre')+'</div><div class="card-sub">'+(f.operacion||'')+' · '+(f.estado||'En Proceso')+'</div></div></div>';}
    return'<div class="card" onclick="openFicha(\''+f.id+'\')"><div class="card-icon" style="background:var(--bg4)">📑</div><div class="card-body"><div class="card-title">'+(f.propiedad||'Sin nombre')+'</div><div class="card-sub"><span style="color:'+opColor+'">'+(f.operacion||'—')+'</span> · '+(f.tipo||'')+(docFalta?' · '+docFalta+' doc. falta':'')+'</div></div><span class="badge '+(f.estado==='Cerrada'?'badge-gray':'badge-yellow')+'">'+(f.estado||'En Proceso')+'</span></div>';
  };
  if(abiertas.length){html+=abiertas.map(renderFichaCard).join('');}
  if(cerradas.length&&!selMode){html+='<div class="section-label" style="margin-top:8px;color:var(--text3)">Cerradas ('+cerradas.length+')</div>';html+=cerradas.map(renderFichaCard).join('');}
  else if(cerradas.length&&selMode){html+=cerradas.map(renderFichaCard).join('');}
  el.innerHTML=html;
}

function optionsHTML(opts,sel){return opts.map(o=>'<option value="'+o.replace(/"/g,'&quot;')+'"'+(o===sel?' selected':'')+'>'+o+'</option>').join('')+'<option value="__otro__"'+(sel&&!opts.includes(sel)?' selected':'')+'>➕ Otro...</option>';}
function getUsedDocs(exceptCard){
  const used=[];
  ['f-doc-tenemos','f-doc-falta'].forEach(listId=>{
    const list=document.getElementById(listId);if(!list)return;
    Array.from(list.querySelectorAll('.ficha-card')).forEach(card=>{
      if(card===exceptCard)return;
      const v=card.querySelector('.doc-documento')?.value;
      if(v&&v!=='__otro__')used.push(v);
    });
  });
  return used;
}
function docOptionsHTML(sel,exceptCard){
  const used=getUsedDocs(exceptCard);
  const avail=DOC_OPTIONS.filter(o=>o===sel||!used.includes(o));
  const placeholder='<option value=""'+(!sel?' selected':'')+'>Seleccionar...</option>';
  return placeholder+avail.map(o=>'<option value="'+o.replace(/"/g,'&quot;')+'"'+(o===sel?' selected':'')+'>'+o+'</option>').join('')+'<option value="__otro__"'+(sel&&!DOC_OPTIONS.includes(sel)?' selected':'')+'>➕ Otro...</option>';
}
function refreshDocDropdowns(){
  ['f-doc-tenemos','f-doc-falta'].forEach(listId=>{
    const list=document.getElementById(listId);if(!list)return;
    Array.from(list.querySelectorAll('.ficha-card')).forEach(card=>{
      const sel=card.querySelector('.doc-documento');if(!sel)return;
      const cur=sel.value;
      sel.innerHTML=docOptionsHTML((cur==='__otro__'||cur==='')?null:cur,card);

    +'</div></div>';

  // PARTE COMPRADORA

  html+='<div style="padding:0 16px 20px;display:flex;gap:10px"><button class="btn btn-primary" style="flex:1" onclick="saveFichaFromForm(true)">💾 Guardar ficha</button><button class="btn" style="background:var(--red-bg);color:var(--red);border-color:rgba(224,85,85,0.2)" onclick="deleteFicha(\''+id+'\')">Eliminar</button></div>';

  if(faltan.length)faltan.forEach(d=>addDocRow(d,'falta'));else addDocRow(null,'falta');
  (f.vendedora&&f.vendedora.length?f.vendedora:[{}]).forEach(p=>addParteFichaRow('vendedora',p));
  (f.compradora&&f.compradora.length?f.compradora:[{}]).forEach(p=>addParteFichaRow('compradora',p));

function addDocRow(data,estadoFijo){

  card.style.borderLeft='4px solid '+col;
  card.style.background=bg;
  const docOpts=docOptionsHTML(d.documento,card);

  const hasObs=!!(d.observaciones&&d.observaciones.trim());

    +'<input type="text" class="doc-documento-otro" placeholder="Especificar documento" value="'+((d.documento&&!DOC_OPTIONS.includes(d.documento))?d.documento.replace(/"/g,'&quot;'):'')+'" style="font-size:13px;padding:7px 10px;margin-bottom:8px;display:'+((d.documento&&!DOC_OPTIONS.includes(d.documento))?'block':'none')+'">'
    +'<button type="button" class="doc-obs-toggle" onclick="toggleDocObs(this)" style="background:none;border:0.5px dashed var(--border2);border-radius:6px;padding:5px 10px;color:var(--text3);font-size:11px;cursor:pointer;font-family:var(--font);display:'+(hasObs?'none':'inline-block')+'">+ Observación</button>'
    +'<div class="doc-obs-wrap" style="display:'+(hasObs?'block':'none')+';margin-top:'+(estado==='falta'?'8px':'0')+'"><div class="ficha-field" style="margin-bottom:'+(estado==='falta'?'8px':'0')+'"><label>Observaciones</label><input type="text" class="doc-obs" value="'+(d.observaciones||'').replace(/"/g,'&quot;')+'" style="font-size:13px;padding:7px 10px"></div></div>';
  if(estado==='falta'){

      +'<input type="text" class="doc-encargado-otro" placeholder="Especificar profesional" value="'+((d.encargado&&d.encargado!=='Cliente'&&!PROF_OPTIONS.includes(d.encargado))?d.encargado.replace(/"/g,'&quot;'):'')+'" style="font-size:13px;padding:7px 10px;margin-bottom:8px;display:'+((d.encargado&&d.encargado!=='Cliente'&&!PROF_OPTIONS.includes(d.encargado))?'block':'none')+'">'
      +'<div class="doc-prof-extra" style="display:'+((d.encargado&&d.encargado!=='Cliente')?'block':'none')+'">'
      +'<div class="ficha-field" style="margin-bottom:8px"><label>¿Por qué?</label><input type="text" class="doc-porque" value="'+(d.porque||'').replace(/"/g,'&quot;')+'" style="font-size:13px;padding:7px 10px"></div>'
      +'<div class="ficha-field" style="margin-bottom:8px"><label>¿Cómo son?</label><input type="text" class="doc-comoson" value="'+(d.comoSon||'').replace(/"/g,'&quot;')+'" style="font-size:13px;padding:7px 10px"></div>'
      +'<div class="ficha-field" style="margin-bottom:8px"><label>Costos estimados</label><input type="text" class="doc-costos" value="'+(d.costos||'').replace(/"/g,'&quot;')+'" style="font-size:13px;padding:7px 10px"></div>'
      +'<div class="ficha-field" style="margin-bottom:8px"><label>Acciones por realizar</label><input type="text" class="doc-acciones" value="'+(d.acciones||'').replace(/"/g,'&quot;')+'" style="font-size:13px;padding:7px 10px"></div>'
      +'</div>'
      +'<div style="display:grid;grid-template-columns:1fr 1fr;gap:8px"><div class="ficha-field" style="margin-bottom:0"><label>Tiempo estimado</label><input type="number" class="doc-tiempo-num" value="'+(d.tiempoNum||'')+'" min="1" style="font-size:13px;padding:7px 10px"></div><div class="ficha-field" style="margin-bottom:0"><label>Unidad</label><select class="doc-tiempo-unidad" style="font-size:13px;padding:7px 10px"><option value="dias"'+(d.tiempoUnidad==='dias'?' selected':'')+'>Días hábiles</option><option value="corridos"'+(d.tiempoUnidad==='corridos'?' selected':'')+'>Días corridos</option><option value="meses"'+(d.tiempoUnidad==='meses'?' selected':'')+'>Meses</option></select></div></div>'
      +'<div class="doc-fecha-preview" style="font-size:11px;color:var(--accent);margin-top:6px"></div>';

function toggleDocObs(btn){const card=btn.closest('.ficha-card');const wrap=card.querySelector('.doc-obs-wrap');if(wrap){wrap.style.display='block';btn.style.display='none';const inp=wrap.querySelector('.doc-obs');if(inp)inp.focus();}}
function updateDocFechaPreview(card){
  const num=parseInt(card.querySelector('.doc-tiempo-num')?.value)||0;
  const unit=card.querySelector('.doc-tiempo-unidad')?.value||'dias';
  const prev=card.querySelector('.doc-fecha-preview');
  if(!prev)return;
  if(num<=0){prev.textContent='';return;}
  let d;
  if(unit==='dias')d=addBizDays(new Date(),num);
  else{d=new Date();if(unit==='corridos')d.setDate(d.getDate()+num);else d.setMonth(d.getMonth()+num);}
  prev.textContent='📅 Fecha estimada: '+fmtDateFull(d.toISOString().slice(0,10))+' · avisos: 7 días antes y el día';
}
function checkOtro(sel){const card=sel.closest('.ficha-card');const otroInp=card.querySelector('.doc-documento-otro');if(sel.value==='__otro__'){otroInp.style.display='block';otroInp.focus();}else{otroInp.style.display='none';}}
function checkTipoOtro(sel){const otro=document.getElementById('f-tipo-otro');if(!otro)return;if(sel.value==='__otro__'){otro.style.display='block';otro.focus();}else{otro.style.display='none';}}
function checkEncargado(sel){const card=sel.closest('.ficha-card');const otroInp=card.querySelector('.doc-encargado-otro');const profExtra=card.querySelector('.doc-prof-extra');const isCliente=sel.value==='Cliente';const isOtro=sel.value==='__otro__';otroInp.style.display=isOtro?'block':'none';profExtra.style.display=isCliente?'none':'block';if(isOtro)otroInp.focus();}

    +'<div class="ficha-field" style="margin-bottom:8px"><label>¿Cómo son?</label><input type="text" class="pf-comoson" value="'+(p.comoSon||'').replace(/"/g,'&quot;')+'" style="font-size:13px;padding:7px 10px"></div>'
    +'<div class="ficha-field" style="margin-bottom:8px"><label>¿Qué esperan?</label><input type="text" class="pf-esperan" value="'+(p.esperan||'').replace(/"/g,'&quot;')+'" style="font-size:13px;padding:7px 10px"></div>'

function updateUrgColor(sel){const v=sel.value;const c=v==='3'?'var(--red)':v==='2'?'var(--yellow)':'var(--green)';sel.style.borderColor=c;sel.style.color=c;}

function getDocRows(){
  const result=[];
  ['f-doc-tenemos','f-doc-falta'].forEach(listId=>{
    const list=document.getElementById(listId);if(!list)return;
    Array.from(list.querySelectorAll('.ficha-card')).forEach(card=>{
      const estado=card.dataset.estado||'tenemos';
      let documento=card.querySelector('.doc-documento')?.value||'';
      if(documento==='__otro__'){const otro=card.querySelector('.doc-documento-otro')?.value.trim();if(otro){documento=otro;if(!DOC_OPTIONS.includes(otro))DOC_OPTIONS.push(otro);}}
      if(!documento||documento==='__otro__')return;
      const row={documento,estado,observaciones:card.querySelector('.doc-obs')?.value.trim()||''};
      if(estado==='falta'){
        let encargado=card.querySelector('.doc-encargado')?.value||'';
        if(encargado==='__otro__'){const otro=card.querySelector('.doc-encargado-otro')?.value.trim();if(otro){encargado=otro;if(!PROF_OPTIONS.includes(otro))PROF_OPTIONS.push(otro);}}
        row.encargado=encargado;row.porque=card.querySelector('.doc-porque')?.value.trim()||'';row.comoSon=card.querySelector('.doc-comoson')?.value.trim()||'';row.costos=card.querySelector('.doc-costos')?.value.trim()||'';row.acciones=card.querySelector('.doc-acciones')?.value.trim()||'';row.tiempoNum=card.querySelector('.doc-tiempo-num')?.value||'';row.tiempoUnidad=card.querySelector('.doc-tiempo-unidad')?.value||'dias';
      }
      result.push(row);
    });
  });
  return result;
}
function getParteFichaRows(parte){
  const list=document.getElementById('f-'+parte+'-list');if(!list)return[];
  return Array.from(list.querySelectorAll('.ficha-card')).map(card=>({origen:card.querySelector('.pf-origen')?.value||'Cliente',nombre:card.querySelector('.pf-nombre')?.value.trim()||'',observaciones:card.querySelector('.pf-obs')?.value.trim()||'',comoSon:card.querySelector('.pf-comoson')?.value.trim()||'',esperan:card.querySelector('.pf-esperan')?.value.trim()||'',urgencia:card.querySelector('.pf-urgencia')?.value||'1',acciones:card.querySelector('.pf-acciones')?.value.trim()||''})).filter(p=>p.nombre);
}

async function saveFichaFromForm(showToast){
  const f=fichas.find(x=>x.id===currentFichaId);if(!f)return;
  f.propiedad=gval('f-propiedad');f.operacion=gval('f-operacion');f.estado=gval('f-estado');
  let tipo=gval('f-tipo');if(tipo==='__otro__'){const otro=gval('f-tipo-otro');if(otro){tipo=otro;if(!TIPO_OPTIONS.includes(otro))TIPO_OPTIONS.push(otro);}}f.tipo=tipo;
  f.caracteristicas=gval('f-caracteristicas');f.porqueVende=gval('f-porque');f.situacionLegal=gval('f-legal');f.observaciones=gval('f-obs');f.riesgos=gval('f-riesgos');f.soluciones=gval('f-soluciones');
  f.documentacion=getDocRows();f.vendedora=getParteFichaRows('vendedora');f.compradora=getParteFichaRows('compradora');
  f.vendSeguimiento={ultimoContacto:gval('f-vend-contacto'),sabemos:(document.getElementById('f-vend-sabemos')||{value:''}).value.trim(),proximoContacto:gval('f-vend-proximo'),falta:(document.getElementById('f-vend-falta')||{value:''}).value.trim()};
  f.compSeguimiento={ultimoContacto:gval('f-comp-contacto'),sabemos:(document.getElementById('f-comp-sabemos')||{value:''}).value.trim(),proximoContacto:gval('f-comp-proximo'),falta:(document.getElementById('f-comp-falta')||{value:''}).value.trim()};
  // Generate notifications from documentation deadlines
  f.docReminders=[];
  (f.documentacion||[]).forEach(d=>{if(d.estado==='falta'&&d.tiempoNum){const num=parseInt(d.tiempoNum);if(num>0){let dt;if(d.tiempoUnidad==='dias')dt=addBizDays(new Date(),num);else{dt=new Date();if(d.tiempoUnidad==='corridos')dt.setDate(dt.getDate()+num);else dt.setMonth(dt.getMonth()+num);}const fecha=dt.getTime();const aviso7=fecha-7*86400000;f.docReminders.push({doc:d.documento,fecha,aviso7});}}});
  await saveShared();
  if(showToast)toast('Ficha guardada');
}
async function deleteFicha(id){fichas=fichas.filter(f=>f.id!==id);await saveShared();toast('Ficha eliminada');showTab('seguimiento');}

function renderPropiedades(){
  const el=document.getElementById('propiedades-content');
  let html='';
  if(selMode){
    const n=Object.values(selected).filter(Boolean).length;
    html+='<div class="sel-bar"><button class="btn btn-sm" onclick="toggleSelModeProp()">Cancelar</button><span class="sel-count">'+n+' seleccionada'+(n!==1?'s':'')+'</span>'+(n>0?'<button class="btn btn-sm" style="background:var(--green-bg);color:var(--green);border-color:rgba(76,175,125,0.3)" onclick="bulkCompleteProp()">Completar</button><button class="btn btn-sm" style="background:var(--bg4);color:var(--text2)" onclick="bulkCloseProp()">Cerrar</button><button class="btn btn-sm" style="background:var(--red-bg);color:var(--red);border-color:rgba(224,85,85,0.2)" onclick="bulkDeleteProp()">Eliminar</button>':'')+'</div>';
  }else{
    html+='<div style="display:flex;justify-content:space-between;align-items:center;padding-right:16px"><div class="section-label">Análisis de propiedades</div>'+(propiedades.length?'<button class="btn btn-sm" onclick="toggleSelModeProp()">Seleccionar</button>':'')+'</div>';
    html+='<div style="padding:0 16px 12px"><button class="btn btn-primary btn-full" onclick="newProp()">+ Nueva propiedad</button></div>';
  }
  if(!propiedades.length){html+='<div class="empty"><div class="empty-icon">🏢</div><p>No hay propiedades cargadas.<br>Creá una para analizar acciones, cliente y reporte.</p></div>';el.innerHTML=html;return;}
  const abiertas=propiedades.filter(p=>p.estadoProp!=='Cerrada'&&p.estadoProp!=='Completada');
  const cerradas=propiedades.filter(p=>p.estadoProp==='Cerrada'||p.estadoProp==='Completada');
  const card=(p)=>{
    const pend=(p.acciones||[]).filter(a=>a.seHizo&&a.seHizo.indexOf('No se hizo')===0).length;
    if(selMode){const ck=selected[p.id];return'<div class="card selectable" onclick="toggleSelectProp(\''+p.id+'\')"><div class="sel-check'+(ck?' checked':'')+'">'+(ck?'✓':'')+'</div><div class="card-body"><div class="card-title">'+(p.nombre||'Sin nombre')+'</div><div class="card-sub">'+(p.estadoProp||'En Proceso')+'</div></div></div>';}
    return'<div class="card" onclick="openProp(\''+p.id+'\')"><div class="card-icon" style="background:var(--bg4)">🏢</div><div class="card-body"><div class="card-title">'+(p.nombre||'Sin nombre')+'</div><div class="card-sub">'+(p.publico&&p.publico.length?p.publico.join(', '):'Sin público def.')+(pend?' · '+pend+' acción'+(pend>1?'es':'')+' pend.':'')+'</div></div><span class="badge '+(p.estadoProp==='Cerrada'||p.estadoProp==='Completada'?'badge-gray':'badge-yellow')+'">'+(p.estadoProp||'En Proceso')+'</span></div>';
  };
  if(abiertas.length)html+=abiertas.map(card).join('');
  if(cerradas.length){if(!selMode)html+='<div class="section-label" style="margin-top:8px;color:var(--text3)">Cerradas / Completadas ('+cerradas.length+')</div>';html+=cerradas.map(card).join('');}
  el.innerHTML=html;
}
function toggleSelModeProp(){selMode=!selMode;selected={};renderPropiedades();}
function toggleSelectProp(id){selected[id]=!selected[id];renderPropiedades();}
async function bulkCompleteProp(){const ids=Object.keys(selected).filter(k=>selected[k]);ids.forEach(id=>{const p=propiedades.find(x=>x.id===id);if(p)p.estadoProp='Completada';});await saveShared();selMode=false;selected={};toast(ids.length+' completada'+(ids.length>1?'s':''));renderPropiedades();}
async function bulkCloseProp(){const ids=Object.keys(selected).filter(k=>selected[k]);ids.forEach(id=>{const p=propiedades.find(x=>x.id===id);if(p)p.estadoProp='Cerrada';});await saveShared();selMode=false;selected={};toast(ids.length+' cerrada'+(ids.length>1?'s':''));renderPropiedades();}
async function bulkDeleteProp(){const ids=Object.keys(selected).filter(k=>selected[k]);propiedades=propiedades.filter(p=>!ids.includes(p.id));await saveShared();selMode=false;selected={};toast(ids.length+' eliminada'+(ids.length>1?'s':''));renderPropiedades();}

function renderAccionRows(p){
  const hechas=document.getElementById('p-acc-hechas');
  const pend=document.getElementById('p-acc-pendientes');
  if(!hechas||!pend)return;
  hechas.innerHTML='';pend.innerHTML='';
  (p.acciones||[]).forEach(a=>{
    const esHecha=a.seHizo&&a.seHizo.indexOf('Se hizo')===0;
    addAccionRowEl(esHecha?hechas:pend,a);
  });
}
function accionEstadoInfo(seHizo){
  const s=seHizo||'';
  if(s.indexOf('REHACER')>=0)return{color:'var(--blue)',bg:'rgba(106,176,232,0.12)',tag:'🔄 Se hizo — se podría REHACER',tagColor:'var(--blue)'};
  if(s.indexOf('Se hizo')===0){
    if(s.indexOf('SI se ejecut')>=0)return{color:'var(--green)',bg:'rgba(76,175,125,0.15)',tag:'✅ Se hizo y se ejecutó',tagColor:'var(--green)'};
    if(s.indexOf('NO se ejecut')>=0)return{color:'var(--green)',bg:'rgba(76,175,125,0.15)',tag:'✅ Se hizo (no se ejecutó)',tagColor:'var(--green)'};
    return{color:'var(--green)',bg:'rgba(76,175,125,0.15)',tag:'✅ Se hizo',tagColor:'var(--green)'};
  }
  if(s.indexOf('NO lo har')>=0)return{color:'var(--red)',bg:'rgba(224,85,85,0.1)',tag:'⛔ No se haría',tagColor:'var(--red)'};
  if(s.indexOf('No se hizo')===0)return{color:'var(--yellow)',bg:'rgba(240,192,96,0.1)',tag:'⏳ Se podría hacer',tagColor:'var(--yellow)'};
  return{color:'var(--text3)',bg:'transparent',tag:'Sin definir',tagColor:'var(--text3)'};
}
function addAccionRowEl(container,a){
  const d=a||{};
  const info=accionEstadoInfo(d.seHizo);
  const card=document.createElement('div');card.className='ficha-card prop-accion';
  card.style.borderLeft='4px solid '+info.color;
  card.style.background=info.bg;
  card.innerHTML='<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px"><span class="acc-tag" style="font-size:11px;font-weight:700;color:'+info.tagColor+'">'+info.tag+'</span><button type="button" onclick="var c=this.closest(\'.ficha-card\');c.remove();setTimeout(reflowAcciones,10)" style="background:none;border:none;color:var(--text3);cursor:pointer;font-size:16px">✕</button></div>'
    +'<input type="text" class="acc-nombre" value="'+(d.accion||'').replace(/"/g,'&quot;')+'" placeholder="Nombre de la acción" style="width:100%;font-size:13px;padding:7px 10px;font-weight:600;margin-bottom:6px">'
    +'<div class="ficha-field" style="margin-bottom:6px"><select class="acc-sehizo" onchange="checkSelOtro(this);setTimeout(reflowAcciones,10)">'+optionsHTML(PROP_OPTIONS.accionSeHizo,d.seHizo)+'</select><input type="text" class="acc-sehizo-otro" placeholder="Especificar" value="'+((d.seHizo&&!PROP_OPTIONS.accionSeHizo.includes(d.seHizo))?d.seHizo.replace(/"/g,'&quot;'):'')+'" style="font-size:13px;padding:7px 10px;margin-top:6px;display:'+((d.seHizo&&!PROP_OPTIONS.accionSeHizo.includes(d.seHizo))?'block':'none')+'"></div>'

  container.appendChild(card);
}
function addAccionRow(){const pend=document.getElementById('p-acc-pendientes');addAccionRowEl(pend,{accion:'',seHizo:'No se hizo, se podria hacer',fecha:'',descripcion:''});}
function reflowAcciones(){
  const p=collectPropForm();
  const cur=propiedades.find(x=>x.id===currentPropId);

function renderPublicoChips(p){
  const cont=document.getElementById('p-publico-chips');if(!cont)return;
  const sel=p.publico||[];
  let html='<div style="display:flex;flex-wrap:wrap;gap:6px">';
  PROP_OPTIONS.publico.forEach(opt=>{const on=sel.includes(opt);html+='<button type="button" class="pub-chip" data-pub="'+opt.replace(/"/g,'&quot;')+'" data-on="'+(on?'1':'0')+'" onclick="togglePublico(this)" style="padding:6px 12px;border-radius:16px;border:0.5px solid '+(on?'var(--accent)':'var(--border2)')+';background:'+(on?'rgba(232,213,163,0.15)':'transparent')+';color:'+(on?'var(--accent)':'var(--text2)')+';font-size:12px;cursor:pointer;font-family:var(--font)">'+opt+'</button>';});
  html+='<button type="button" onclick="addPublicoOtro()" style="padding:6px 12px;border-radius:16px;border:0.5px dashed var(--border2);background:transparent;color:var(--text3);font-size:12px;cursor:pointer;font-family:var(--font)">+ Otro</button>';
  html+='</div>';
  cont.innerHTML=html;

function togglePublico(btn){const on=btn.dataset.on==='1';if(on){btn.dataset.on='0';btn.style.borderColor='var(--border2)';btn.style.background='transparent';btn.style.color='var(--text2)';}else{btn.dataset.on='1';btn.style.borderColor='var(--accent)';btn.style.background='rgba(232,213,163,0.15)';btn.style.color='var(--accent)';}}
function addPublicoOtro(){const v=prompt('Nuevo público destinado:');if(v&&v.trim()){const nv=v.trim();if(!PROP_OPTIONS.publico.includes(nv))PROP_OPTIONS.publico.push(nv);const p=collectPropForm();const cur=propiedades.find(x=>x.id===currentPropId);if(cur){Object.assign(cur,p);if(!cur.publico.includes(nv))cur.publico.push(nv);renderPublicoChips(cur);}}}
function getPublicoSelected(){const cont=document.getElementById('p-publico-chips');if(!cont)return[];return Array.from(cont.querySelectorAll('.pub-chip')).filter(b=>b.dataset.on==='1').map(b=>b.dataset.pub);}

function updateIdxColor(sel){const v=sel.value;const c=v==='3'?'var(--red)':v==='2'?'var(--yellow)':'var(--green)';sel.style.borderColor=c;sel.style.color=c;}

function getAccionRows(){
  const result=[];
  ['p-acc-hechas','p-acc-pendientes'].forEach(cid=>{
    const cont=document.getElementById(cid);if(!cont)return;
    Array.from(cont.querySelectorAll('.prop-accion')).forEach(card=>{
      let seHizo=card.querySelector('.acc-sehizo')?.value||'';
      if(seHizo==='__otro__'){const otro=card.querySelector('.acc-sehizo-otro')?.value.trim();if(otro){seHizo=otro;if(!PROP_OPTIONS.accionSeHizo.includes(otro))PROP_OPTIONS.accionSeHizo.push(otro);}}
      const accion=card.querySelector('.acc-nombre')?.value.trim()||'';
      if(!accion)return;
      result.push({accion,seHizo,fecha:card.querySelector('.acc-fecha')?.value||'',descripcion:card.querySelector('.acc-desc')?.value.trim()||''});
    });
  });
  return result;
}

function collectPropForm(){
  const cont=document.getElementById('prop-content');
  return{
    nombre:gval('p-nombre'),estadoProp:gval('p-estadoprop'),
    acciones:getAccionRows(),
    publico:getPublicoSelected(),
    estadoGeneral:gval('p-estadogral'),limpieza:gval('p-limpieza'),
    ocupacion:readAmpliable(cont,'p-ocupacion','ocupacion'),
    llaves:gval('p-llaves'),factibilidad:gval('p-factibilidad'),factibilidadRazon:gval('p-factibilidad-razon'),
    positivo:(document.getElementById('p-positivo')||{value:''}).value.trim(),negativo:(document.getElementById('p-negativo')||{value:''}).value.trim(),
    esperaCliente:readAmpliable(cont,'p-espera','esperaCliente'),acercarse:gval('p-acercarse'),
    permuta:readAmpliable(cont,'p-permuta','permuta'),sugerenciasMejoras:gval('p-sugerencias'),
    frecuencia:readAmpliable(cont,'p-frecuencia','frecuencia'),reubicacion:gval('p-reubicacion'),
    urgencia:gval('p-urgencia'),urgenciaRazon:gval('p-urgencia-razon'),permeabilidad:gval('p-permeabilidad'),
    reporteCada:readAmpliable(cont,'p-reportecada','reporteCada'),formaEntrega:readAmpliable(cont,'p-formaentrega','formaEntrega'),
    reunionPresencial:readAmpliable(cont,'p-reunion','reunionPresencial')
  };
}
async function savePropFromForm(showToast){
  const p=propiedades.find(x=>x.id===currentPropId);if(!p)return;
  Object.assign(p,collectPropForm());
  await saveShared();
  if(showToast)toast('Propiedad guardada');
}
async function deleteProp(id){propiedades=propiedades.filter(p=>p.id!==id);await saveShared();toast('Propiedad eliminada');showTab('propiedades');}
