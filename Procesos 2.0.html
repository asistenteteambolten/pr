<title>Procesos</title>
<style>
:root{--bg:#0f0f0f;--bg2:#1a1a1a;--bg3:#242424;--bg4:#2e2e2e;--border:rgba(255,255,255,0.08);--border2:rgba(255,255,255,0.16);--text:#f0f0f0;--text2:#999;--text3:#666;--accent:#e8d5a3;--accent2:#c4a96b;--green:#4caf7d;--green-bg:rgba(76,175,125,0.12);--yellow:#f0c060;--yellow-bg:rgba(240,192,96,0.12);--red:#e05555;--red-bg:rgba(224,85,85,0.12);--blue:#6ab0e8;--radius:12px;--radius-sm:8px;--font:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:var(--font);font-size:15px}
body{display:flex;flex-direction:column;min-height:100vh}
.app-shell{display:flex;flex-direction:column;width:100%;min-height:100vh;position:relative}
@media(min-width:768px){
  .app-shell{max-width:100%;padding:0}
  .card{margin:0 24px 10px}
  .step-item{margin:0 24px 8px}
  .section-label{padding:20px 24px 10px}
  .sec-title{padding:14px 24px 8px}
  .cl-header{padding:0 24px 20px}
  .new-form{padding:0 24px}
  .topbar{padding:20px 24px 12px}
  .back-btn{padding:16px 24px 12px}
  .stats-bar{padding:16px 24px}
}
.topbar{padding:16px 20px 10px;display:flex;align-items:center;justify-content:space-between;border-bottom:0.5px solid var(--border);background:var(--bg);position:sticky;top:0;z-index:50}
.topbar-title{font-size:18px;font-weight:700;color:var(--text);letter-spacing:-0.4px}
.topbar-sub{font-size:12px;color:var(--text3);margin-top:2px}
.bottom-nav{display:flex;background:var(--bg2);border-top:0.5px solid var(--border);position:sticky;bottom:0;z-index:50}
.bnav-btn{flex:1;padding:10px 4px 14px;display:flex;flex-direction:column;align-items:center;gap:3px;background:none;border:none;cursor:pointer;color:var(--text3);font-size:10px;font-family:var(--font);transition:color .15s;position:relative}
.bnav-btn.active{color:var(--accent)}
.bnav-btn svg{width:22px;height:22px;stroke:currentColor;fill:none;stroke-width:1.6;stroke-linecap:round;stroke-linejoin:round}
.bnav-badge{position:absolute;top:6px;right:calc(50% - 18px);background:var(--red);color:#fff;font-size:9px;font-weight:700;padding:1px 5px;border-radius:10px;min-width:16px;text-align:center}
.screen{display:none;flex:1;overflow-y:auto;padding-bottom:20px}
.screen.active{display:block}
.section-label{font-size:11px;font-weight:600;letter-spacing:.07em;text-transform:uppercase;color:var(--text3);padding:18px 20px 8px}
.card{background:var(--bg2);border:0.5px solid var(--border);border-radius:var(--radius);margin:0 16px 8px;padding:14px 16px;cursor:pointer;display:flex;align-items:center;gap:12px;transition:background .12s}
.card:hover{background:var(--bg3)}
.card-icon{width:40px;height:40px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0}
.card-body{flex:1;min-width:0}
.card-title{font-size:14px;font-weight:500;color:var(--text)}
.card-sub{font-size:12px;color:var(--text2);margin-top:3px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.badge{font-size:11px;font-weight:600;padding:3px 9px;border-radius:20px;flex-shrink:0}
.badge-green{background:var(--green-bg);color:var(--green)}
.badge-yellow{background:var(--yellow-bg);color:var(--yellow)}
.badge-red{background:var(--red-bg);color:var(--red)}
.badge-gray{background:var(--bg3);color:var(--text2)}
.badge-accent{background:rgba(232,213,163,0.15);color:var(--accent)}
.prog-bar{height:3px;background:var(--bg4);border-radius:2px;overflow:hidden;margin-top:8px}
.prog-fill{height:100%;background:var(--accent);border-radius:2px;transition:width .3s}
.btn{display:inline-flex;align-items:center;gap:6px;padding:10px 16px;border-radius:var(--radius-sm);font-size:13px;font-family:var(--font);cursor:pointer;border:0.5px solid var(--border2);background:var(--bg3);color:var(--text);transition:background .1s}
.btn:hover{background:var(--bg4)}
.btn-primary{background:var(--accent);color:#0f0f0f;border-color:transparent;font-weight:600}
.btn-primary:hover{background:var(--accent2)}
.btn-full{width:100%;justify-content:center}
.btn-sm{padding:7px 12px;font-size:12px}
.input-wrap{margin-bottom:14px}
.input-label{font-size:12px;color:var(--text2);margin-bottom:6px;display:block;font-weight:500}
.input-label .req{color:var(--red);margin-left:2px}
input[type=text],input[type=number],input[type=date],select{width:100%;padding:11px 14px;background:var(--bg3);border:0.5px solid var(--border2);border-radius:var(--radius-sm);color:var(--text);font-size:14px;font-family:var(--font);outline:none;-webkit-appearance:none;appearance:none;transition:border-color .15s}
input[type=text]:focus,input[type=number]:focus,input[type=date]:focus,select:focus{border-color:var(--accent)}
input.error,select.error{border-color:var(--red)}
input::placeholder{color:var(--text3)}
.back-btn{display:flex;align-items:center;gap:6px;color:var(--accent);font-size:14px;cursor:pointer;padding:14px 20px 10px;background:none;border:none;font-family:var(--font)}
.back-btn svg{width:18px;height:18px;stroke:currentColor;fill:none;stroke-width:2;stroke-linecap:round}
.cl-header{padding:0 20px 16px;border-bottom:0.5px solid var(--border);margin-bottom:4px}
.cl-header-title{font-size:20px;font-weight:700;color:var(--text);letter-spacing:-0.4px}
.cl-header-sub{font-size:13px;color:var(--text2);margin-top:3px}
.cl-stats{display:flex;align-items:center;gap:10px;margin-top:12px;flex-wrap:wrap}
.partes-block{background:var(--bg3);border-radius:var(--radius-sm);padding:12px 14px;margin-bottom:10px}
.partes-title{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.06em;color:var(--text3);margin-bottom:8px}
.parte-row{display:flex;align-items:center;gap:8px;margin-bottom:6px}
.parte-row input{flex:1;padding:8px 12px;font-size:13px}
.add-parte-btn{background:none;border:0.5px dashed var(--border2);border-radius:var(--radius-sm);padding:7px 12px;color:var(--text3);font-size:12px;cursor:pointer;width:100%;font-family:var(--font);transition:all .1s}
.add-parte-btn:hover{color:var(--accent);border-color:var(--accent)}
.sec-group{border-top:0.5px solid var(--border);margin-top:16px}
.sec-group:first-child{border-top:none;margin-top:0}
.sec-title{font-size:10px;font-weight:700;letter-spacing:.09em;text-transform:uppercase;color:var(--text3);padding:14px 20px 8px}
.step-item{margin:0 16px 6px;background:var(--bg2);border:0.5px solid var(--border);border-radius:var(--radius);overflow:hidden;transition:border-color .2s}
.step-item.done{border-color:rgba(76,175,125,0.25)}
.step-item.pending{border-color:rgba(240,192,96,0.25)}
.step-item.skip{opacity:.5}
.step-main{padding:12px 14px;display:flex;gap:10px;align-items:flex-start}
.step-num{width:24px;height:24px;border-radius:50%;background:var(--bg4);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:600;color:var(--text3);flex-shrink:0;transition:all .2s}
.step-num.done{background:var(--green-bg);color:var(--green)}
.step-num.pending{background:var(--yellow-bg);color:var(--yellow)}
.step-text{flex:1;font-size:13px;line-height:1.5;color:var(--text)}
.step-text.done{text-decoration:line-through;color:var(--text3)}
.step-actions{display:flex;gap:6px;padding:0 14px 12px 48px;flex-wrap:wrap}
.step-act-btn{padding:5px 11px;font-size:12px;font-family:var(--font);border-radius:20px;border:0.5px solid var(--border2);background:var(--bg3);color:var(--text2);cursor:pointer;display:flex;align-items:center;gap:4px;transition:all .12s}
.step-act-btn:hover{background:var(--bg4)}
.step-act-btn.active-done{background:var(--green-bg);color:var(--green);border-color:rgba(76,175,125,0.3)}
.step-act-btn.active-pend{background:var(--yellow-bg);color:var(--yellow);border-color:rgba(240,192,96,0.3)}
.step-act-btn.active-skip{background:var(--bg4);color:var(--text3);border-color:transparent}
.step-note-area{padding:0 14px 10px 48px}
.step-note-area input{font-size:12px;padding:7px 10px;background:var(--bg3)}
.snooze-panel{display:none;padding:10px 14px 14px 48px;background:rgba(240,192,96,0.05);border-top:0.5px solid rgba(240,192,96,0.15)}
.snooze-panel.open{display:block}
.snooze-title{font-size:11px;color:var(--yellow);margin-bottom:8px;font-weight:600}
.snooze-input-wrap{display:flex;align-items:center;gap:8px;margin-bottom:8px}
.snooze-input-wrap input{width:64px;text-align:center;padding:7px 8px}
.snooze-input-wrap span{font-size:12px;color:var(--text2)}
.snooze-presets{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:10px}
.snooze-preset{padding:5px 11px;font-size:12px;border-radius:20px;border:0.5px solid rgba(240,192,96,0.25);background:transparent;color:var(--yellow);cursor:pointer;font-family:var(--font);transition:background .1s}
.snooze-preset:hover{background:var(--yellow-bg)}
.snooze-date-preview{font-size:11px;color:var(--text2);margin-bottom:10px;min-height:16px;font-weight:500}
/* Step extra panel for autorización and propietarios */
.step-extra-panel{display:none;padding:10px 14px 14px 48px;background:rgba(232,213,163,0.05);border-top:0.5px solid rgba(232,213,163,0.2)}
.step-extra-panel.open{display:block}
.step-extra-title{font-size:11px;color:var(--accent);margin-bottom:8px;font-weight:600}
.empty{text-align:center;padding:60px 30px 40px;color:var(--text3)}
.empty-icon{font-size:48px;margin-bottom:12px}
.empty p{font-size:14px;line-height:1.6}
.reminder-item{display:flex;align-items:flex-start;gap:12px;padding:13px 20px;border-bottom:0.5px solid var(--border);cursor:pointer;transition:background .1s}
.reminder-item:hover{background:var(--bg2)}
.reminder-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;margin-top:4px}
.reminder-body{flex:1}
.reminder-prop{font-size:13px;font-weight:600;color:var(--text)}
.reminder-step{font-size:12px;color:var(--text2);margin-top:2px;line-height:1.4}
.reminder-when{font-size:11px;margin-top:4px;font-weight:600}
.new-form{padding:0 20px}
.loading{display:flex;align-items:center;justify-content:center;gap:10px;padding:40px 20px;color:var(--text3);font-size:13px}
.spinner{width:18px;height:18px;border:2px solid var(--border2);border-top-color:var(--accent);border-radius:50%;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.user-pill{padding:5px 14px;background:var(--bg3);border-radius:20px;font-size:12px;color:var(--accent);border:0.5px solid var(--border2);cursor:pointer;font-weight:600}
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.75);z-index:200;display:flex;align-items:flex-end;opacity:0;pointer-events:none;transition:opacity .2s}
.modal-overlay.open{opacity:1;pointer-events:all}
.modal-box{background:var(--bg2);border-radius:var(--radius) var(--radius) 0 0;border-top:0.5px solid var(--border2);padding:20px 20px 40px;width:100%;max-width:600px;margin:0 auto;transform:translateY(30px);transition:transform .2s}
.modal-overlay.open .modal-box{transform:translateY(0)}
.modal-title{font-size:16px;font-weight:700;margin-bottom:16px}
.modal-close-row{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px}
.sheet-status{display:flex;align-items:center;gap:6px;font-size:11px;padding:6px 16px;color:var(--text3)}
.sheet-dot{width:6px;height:6px;border-radius:50%;background:var(--green);flex-shrink:0}
.sheet-dot.error{background:var(--red)}
.sheet-dot.loading{background:var(--yellow);animation:pulse .8s ease-in-out infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
.toast{position:fixed;bottom:80px;left:50%;transform:translateX(-50%) translateY(20px);background:var(--bg3);border:0.5px solid var(--border2);border-radius:var(--radius-sm);padding:10px 18px;font-size:13px;color:var(--text);z-index:300;opacity:0;transition:all .25s;pointer-events:none;white-space:nowrap}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
.stats-bar{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;padding:12px 16px}
.stat-box{background:var(--bg2);border:0.5px solid var(--border);border-radius:var(--radius-sm);padding:10px 12px;text-align:center}
.stat-num{font-size:22px;font-weight:700;color:var(--text)}
.stat-lbl{font-size:10px;color:var(--text3);margin-top:2px;text-transform:uppercase;letter-spacing:.04em}
.partes-display{display:flex;flex-wrap:wrap;gap:6px;margin-top:6px}
.parte-chip{background:var(--bg3);border:0.5px solid var(--border2);border-radius:20px;padding:3px 10px;font-size:11px;color:var(--text2)}
.parte-chip.v{border-color:rgba(76,175,125,0.3);color:var(--green)}
.parte-chip.c{border-color:rgba(106,176,232,0.3);color:var(--blue)}
.time-input-wrap{position:relative;width:100%}
.time-suggestions{position:absolute;top:100%;left:0;right:0;background:var(--bg3);border:0.5px solid var(--border2);border-radius:var(--radius-sm);z-index:100;display:none;overflow:hidden}
.time-suggestions.open{display:block}
.time-opt{padding:9px 14px;cursor:pointer;font-size:13px;color:var(--text)}
.time-opt:hover{background:var(--bg4)}
/* Print styles for escrituracion form */
@media print{
  @page{size:A4;margin:10mm}
  body>*:not(#print-area){display:none!important}
  #print-area{display:block!important;font-family:Arial,sans-serif;font-size:10px;color:#000;padding:0}
  #print-area h2{font-size:14px;text-align:center;margin-bottom:4px;border-bottom:2px solid #000;padding-bottom:4px}
  #print-area .p-section{margin-bottom:6px;border:1px solid #ccc;padding:5px;border-radius:2px;page-break-inside:avoid}
  #print-area .p-section h3{font-size:10px;font-weight:bold;margin-bottom:4px;color:#333;border-bottom:1px solid #eee;padding-bottom:2px}
  #print-area .p-row{display:flex;gap:8px;margin-bottom:2px;flex-wrap:wrap}
  #print-area .p-field{flex:1;min-width:80px}
  #print-area .p-label{font-size:8px;color:#666;text-transform:uppercase;letter-spacing:.03em}
  #print-area .p-val{font-size:10px;font-weight:500;border-bottom:1px solid #ddd;padding-bottom:1px;min-width:60px;min-height:14px}
  #print-area table{width:100%;border-collapse:collapse;margin-top:2px}
  #print-area th{background:#f0f0f0;font-size:9px;padding:2px 4px;text-align:left;border:1px solid #ddd}
  #print-area td{font-size:10px;padding:2px 4px;border:1px solid #ddd}
}
.info-box{background:rgba(232,213,163,0.08);border:0.5px solid rgba(232,213,163,0.2);border-radius:var(--radius-sm);padding:10px 14px;margin-bottom:12px;font-size:12px;color:var(--accent);line-height:1.5}
.overdue-banner{margin:10px 16px 0;background:var(--red-bg);border:0.5px solid rgba(224,85,85,0.3);border-radius:var(--radius-sm);padding:10px 14px;display:flex;align-items:center;gap:10px;cursor:pointer}
.overdue-banner span{font-size:13px;color:var(--red);flex:1}
</style>
</head>
<body>
<div class="app-shell">
<div class="topbar">
  <div style="display:flex;align-items:center;gap:10px">
    <button id="topbar-back-btn" onclick="handleTopBack()" style="display:none;background:none;border:none;cursor:pointer;color:var(--accent);font-size:24px;line-height:1;padding:0 8px 0 0;font-family:var(--font)">‹</button>
    <div><div class="topbar-title">Procesos</div><div class="topbar-sub" id="topbar-sub">Gestión de checklists</div></div>
  </div>
  <div class="user-pill" id="user-pill" onclick="showUserModal()">···</div>
</div>
<div class="screen active" id="screen-home">
  <div class="sheet-status"><div class="sheet-dot loading" id="sheet-dot"></div><span id="sheet-status-txt">Sincronizando...</span></div>
  <div id="home-content"><div class="loading"><div class="spinner"></div>Cargando...</div></div>
</div>
<div class="screen" id="screen-active"><div id="active-content"></div></div>
<div class="screen" id="screen-reminders"><div id="reminders-content"></div></div>
<div class="screen" id="screen-prev"><div id="prev-content"></div></div>
<div class="screen" id="screen-new">
  <button class="back-btn" onclick="goBack()"><svg viewBox="0 0 24 24"><polyline points="15,18 9,12 15,6"/></svg>volver</button>
  <div class="new-form" id="new-form-content"></div>
</div>
<div class="screen" id="screen-checklist">
  <button class="back-btn" onclick="goBack()"><svg viewBox="0 0 24 24"><polyline points="15,18 9,12 15,6"/></svg>volver</button>
  <div id="cl-content"></div>
</div>
<div class="bottom-nav">
  <button class="bnav-btn active" id="bnav-home" onclick="showTab('home')">
    <svg viewBox="0 0 24 24"><path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/><polyline points="9,22 9,12 15,12 15,22"/></svg>Procesos
  </button>
  <button class="bnav-btn" id="bnav-active" onclick="showTab('active')">
    <svg viewBox="0 0 24 24"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><polyline points="14,2 14,8 20,8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/></svg>En curso
  </button>
  <button class="bnav-btn" id="bnav-reminders" onclick="showTab('reminders')">
    <svg viewBox="0 0 24 24"><path d="M18 8A6 6 0 006 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 01-3.46 0"/></svg>Avisos
  </button>
  <button class="bnav-btn" id="bnav-prev" onclick="showTab('prev')">
    <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><polyline points="12,6 12,12 16,14"/></svg>Anteriores
  </button>
</div>
</div>
<div id="print-area" style="display:none;"></div>

<div class="modal-overlay" id="user-modal">
  <div class="modal-box">
    <div class="modal-close-row">
      <div class="modal-title">Tu perfil</div>
      <button class="btn btn-sm" onclick="closeModal('user-modal')">cerrar</button>
    </div>
    <div class="input-wrap">
      <label class="input-label">Tu nombre</label>
      <input type="text" id="user-name-input" placeholder="Ej: Lu, Fer...">
    </div>
    <p style="font-size:12px;color:var(--text3);margin-bottom:16px">Se guarda en este dispositivo para identificarte.</p>
    <button class="btn btn-primary btn-full" onclick="saveUser()">Guardar</button>
  </div>
</div>
<div class="modal-overlay" id="edit-modal">
  <div class="modal-box">
    <div id="modal-content"></div>
  </div>
</div>

<div class="modal-overlay" id="mensaje-modal" style="align-items:flex-start;overflow-y:auto;padding:20px 0">
  <div class="modal-box" style="border-radius:var(--radius);margin:auto;max-height:90vh;overflow-y:auto">
    <div id="mensaje-modal-content"></div>

    setSheetStatus(ok?'ok':'error',ok?`${ok} plantilla${ok>1?'s':''} sincronizada${ok>1?'s':''} desde Google Sheets`:'Sin acceso — usando plantillas locales');

function parseCSV(key,csv){
  if(!META[key])return false;
  const lines=csv.split('\n');
  const sections=[];let cur=null;

  for(const line of lines){
    // Parse CSV properly handling quoted fields
    const cols=[];let field='',inQ=false;
    for(let ci=0;ci<line.length;ci++){
      const ch=line[ci];
      if(ch==='"'){inQ=!inQ;}
      else if(ch===','&&!inQ){cols.push(field.trim());field='';}
      else{field+=ch;}
    }
    cols.push(field.trim());

    // Find the task text — it's the first non-empty, non-checkbox, non-boolean col with real text
    // Checkboxes can be: ☐, TRUE, FALSE, true, false, or empty
    const isCheckbox=v=>/^(☐|TRUE|FALSE|true|false)$/.test(v.trim())||v.trim()===''||v.trim()==='☑';
    
    // Find all non-checkbox columns with meaningful text
    const textCols=cols.map((c,i)=>({i,v:c})).filter(({v})=>!isCheckbox(v)&&v.length>0);
    
    if(textCols.length===0)continue;
    
    const firstText=textCols[0].v;
    
    // Skip meta rows
    if(/^(CHECK|SI$|NO$|TAREA|NOTAS|Propiedad|Fecha|Horario|DNI|Email|Valor|Forma|¿Hay)/i.test(firstText))continue;
    
    // Determine if this row is a step or a section header
    // A step row has at least one checkbox-like value in the first few columns
    const hasCheckbox=cols.slice(0,3).some(v=>isCheckbox(v)&&v.trim()!=='');
    
    if(hasCheckbox&&firstText.length>3){
      // It's a step
      if(cur)cur.steps.push(firstText);
    } else if(firstText.length>1&&firstText.length<100){
      // It's a section header
      cur={label:firstText,steps:[]};
      sections.push(cur);
    }
  }

  if(sections.length>0&&sections.some(s=>s.steps.length>0)){
    APP.templates[key]={...META[key],key,sections};return true;
  }
  return false;
}

}

function makeTimeInput(id, value=''){
  return `<div class="time-input-wrap">
    <input type="text" id="${id}" placeholder="HH:MM" value="${value}" 
      oninput="filterTimeSuggestions('${id}')" onfocus="filterTimeSuggestions('${id}')" autocomplete="off">
    <div class="time-suggestions" id="${id}_sugg">
      ${TIME_OPTS.map(t=>`<div class="time-opt" onclick="selectTime('${id}','${t}')">${t}</div>`).join('')}
    </div>
  </div>`;
}
function toggleTimePicker(id){
  const s=document.getElementById(id+'_sugg');
  if(!s)return;
  const open=s.classList.contains('open');
  document.querySelectorAll('.time-suggestions.open').forEach(e=>e.classList.remove('open'));
  if(!open)s.classList.add('open');
}
function selectTime(id,val){
  const inp=document.getElementById(id);
  if(inp)inp.value=val;
  const s=document.getElementById(id+'_sugg');
  if(s)s.classList.remove('open');
}
function filterTimeSuggestions(id){
  const inp=document.getElementById(id);
  const s=document.getElementById(id+'_sugg');
  if(!inp||!s)return;
  const v=inp.value.replace(':','');
  let any=false;
  s.querySelectorAll('.time-opt').forEach(o=>{
    const show=v===''||o.textContent.replace(':','').startsWith(v)||o.textContent.includes(inp.value);
    o.style.display=show?'block':'none';
    if(show)any=true;
  });
  s.classList.toggle('open',any||v==='');
}

function getEfPartes(tipo){
  const list=document.getElementById(`ef-${tipo}s-list`);
  if(!list)return[];
  const result=[];
  list.querySelectorAll('[id$="-row"]').forEach(row=>{
    const id=row.id.replace('-row','');
    const n=(document.getElementById(id+'-nombre')||{value:''}).value.trim();
    const a=(document.getElementById(id+'-apellido')||{value:''}).value.trim();
    const d=(document.getElementById(id+'-dni')||{value:''}).value.trim();
    if(n||a||d)result.push({nombre:n,apellido:a,dni:d});
  });
  return result;
}

function fmtDateStr(s){if(!s)return'';const d=new Date(s+'T12:00:00');return d.toLocaleDateString('es-AR',{day:'numeric',month:'short',year:'numeric'});}
function totalSteps(tpl){return tpl.sections.reduce((a,s)=>a+s.steps.length,0);}
function doneCount(inst){return Object.values(inst.stepStatus||{}).filter(s=>s.status==='done'||s.status==='skip').length;}
function pendCount(inst){return Object.values(inst.stepStatus||{}).filter(s=>s.status==='pending').length;}
function overdueCount(inst){const now=Date.now();return Object.values(inst.stepStatus||{}).filter(s=>s.status==='pending'&&s.snoozeUntil&&s.snoozeUntil<now).length;}
function allOverdue(){return shared.filter(i=>!i.completed).reduce((a,i)=>a+overdueCount(i),0)+getAutoReminders().filter(r=>r.when<Date.now()).length;}

function getAutoReminders(){
  const rem=[];
  shared.filter(i=>!i.completed).forEach(inst=>{
    if(inst.template==='reserva'&&inst.recordatorioVencimiento)
      rem.push({inst,label:'Vencimiento de reserva',when:inst.recordatorioVencimiento});
    if(inst.template==='captacion'&&inst.autorizacionRecordatorio)
      rem.push({inst,label:'Vencimiento de autorización',when:inst.autorizacionRecordatorio});
    if(inst.template==='escrituracion'){
      if(inst.recordatorio7)rem.push({inst,label:'Escrituración — 7 días antes',when:inst.recordatorio7});
      if(inst.recordatorio3)rem.push({inst,label:'Escrituración — 3 días antes',when:inst.recordatorio3});
      if(inst.recordatorio1)rem.push({inst,label:'Escrituración — 1 día antes',when:inst.recordatorio1});
    }
  });
  return rem;
}

function instCard(inst){
  const tpl=APP.templates[inst.template];if(!tpl)return'';
  const total=totalSteps(tpl),done=doneCount(inst),pct=total>0?Math.round(done/total*100):0;
  const od=overdueCount(inst),pend=pendCount(inst);
  const badge=od>0?`<span class="badge badge-red">⚠ ${od}</span>`:pend>0?`<span class="badge badge-yellow">${pend} pend.</span>`:`<span class="badge badge-gray">${pct}%</span>`;
  const who=inst.createdBy?` · <span style="color:var(--text3)">${inst.createdBy}</span>`:'';
  return`<div class="card" onclick="openInst('${inst.id}')">
    <div class="card-icon" style="background:${tpl.color}">${tpl.icon}</div>
    <div class="card-body">
      <div class="card-title">${inst.name}</div>
      <div class="card-sub">${tpl.label} · ${done}/${total}${who}</div>
      <div class="prog-bar"><div class="prog-fill" style="width:${pct}%;background:${tpl.accent}"></div></div>
    </div>
    <div style="display:flex;flex-direction:column;align-items:flex-end;gap:6px;flex-shrink:0">${badge}</div>
  </div>`;
}

function renderReminders(){
  const el=document.getElementById('reminders-content');
  const now=Date.now();let overdue=[],upcoming=[];
  shared.filter(i=>!i.completed).forEach(inst=>{
    const tpl=APP.templates[inst.template];if(!tpl)return;
    tpl.sections.forEach(sec=>{
      sec.steps.forEach((step,si)=>{
        const key=`${sec.label}__${si}`;
        const st=(inst.stepStatus||{})[key];
        if(st&&st.status==='pending'&&st.snoozeUntil){
          const item={inst,step,snoozeUntil:st.snoozeUntil};
          st.snoozeUntil<=now?overdue.push(item):upcoming.push(item);
        }
      });
    });
  });
  getAutoReminders().forEach(r=>{
    const item={inst:r.inst,step:r.label,snoozeUntil:r.when,isAuto:true};
    r.when<=now?overdue.push(item):upcoming.push(item);
  });
  overdue.sort((a,b)=>a.snoozeUntil-b.snoozeUntil);
  upcoming.sort((a,b)=>a.snoozeUntil-b.snoozeUntil);
  if(!overdue.length&&!upcoming.length){el.innerHTML=`<div class="empty"><div class="empty-icon">🔔</div><p>No hay avisos activos.</p></div>`;return;}
  let html='';
  if(overdue.length){
    html+=`<div class="section-label" style="color:var(--red)">⚠ Vencidos (${overdue.length})</div>`;
    html+=overdue.map(r=>`<div class="reminder-item" onclick="openInst('${r.inst.id}')">
      <div class="reminder-dot" style="background:var(--red)"></div>
      <div class="reminder-body"><div class="reminder-prop">${r.inst.name}</div><div class="reminder-step">${r.step}</div><div class="reminder-when" style="color:var(--red)">Venció ${fmtDate(r.snoozeUntil)}</div></div>
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="var(--text3)" stroke-width="2"><polyline points="9,18 15,12 9,6"/></svg>
    </div>`).join('');
  }
  if(upcoming.length){
    html+=`<div class="section-label">Próximos (${upcoming.length})</div>`;
    html+=upcoming.map(r=>`<div class="reminder-item" onclick="openInst('${r.inst.id}')">
      <div class="reminder-dot" style="background:${r.isAuto?'var(--accent)':'var(--yellow)'}"></div>
      <div class="reminder-body"><div class="reminder-prop">${r.inst.name}</div><div class="reminder-step">${r.step}</div><div class="reminder-when" style="color:var(--yellow)">${fmtDate(r.snoozeUntil)}</div></div>
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="var(--text3)" stroke-width="2"><polyline points="9,18 15,12 9,6"/></svg>
    </div>`).join('');
  }
  el.innerHTML=html;
}

function onFechaReservaChange(){
  const fecha=document.getElementById('ni-fecha-reserva').value;
  const el=document.getElementById('ni-reserva-venc-info');
  if(!fecha){el.innerHTML='';return;}
  const meses=2;
  const venc=new Date(fecha+'T12:00:00');
  venc.setMonth(venc.getMonth()+meses);
  const aviso=new Date(venc);aviso.setDate(aviso.getDate()-7);
  el.innerHTML=`<div class="info-box">La reserva vence el <strong>${fmtDateStr(venc.toISOString().slice(0,10))}</strong>. Te avisamos el ${fmtDateStr(aviso.toISOString().slice(0,10))} (1 semana antes).</div>

function addParte(tipo){
  parteCounters[tipo]++;

  const div=document.createElement('div');
  div.id='row_'+id;
  div.style.cssText='margin-bottom:10px;background:var(--bg4);border-radius:8px;padding:10px;';
  div.innerHTML=`<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:6px">
    <span style="font-size:11px;color:var(--text3);text-transform:uppercase;letter-spacing:.05em">${tipo==='vendedores'?'Vendedor':'Comprador'} ${parteCounters[tipo]}</span>

  </div>

  </div>`;
  document.getElementById(tipo+'-list').appendChild(div);

function removeParte(id){const r=document.getElementById('row_'+id);if(r)r.remove();}

function getPartes(tipo){
  const list=document.getElementById(tipo+'-list');
  if(!list)return[];
  const rows=list.querySelectorAll('[id^="row_"]');
  const result=[];
  rows.forEach(row=>{
    const id=row.id.replace('row_','');
    const nombre=(document.getElementById(id+'_nombre')||{value:''}).value.trim();
    const apellido=(document.getElementById(id+'_apellido')||{value:''}).value.trim();
    if(nombre||apellido)result.push({nombre,apellido,dni:'',cuil:'',email:'',celular:''});
  });
  return result;
}

function gval(id){return(document.getElementById(id)||{value:''}).value.trim();}

async function createInst(key){
  // Validate required fields
  const nameEl=document.getElementById('ni-name');
  const required=[];
  if(nameEl&&!nameEl.value.trim()){nameEl.classList.add('error');required.push('dirección');}
  if(key==='reserva'){
    const fecha=document.getElementById('ni-fecha-reserva');
    const pub=document.getElementById('ni-valor-pub');
    const oferta=document.getElementById('ni-valor-oferta');
    const pago=document.getElementById('ni-pago');
    if(fecha&&!fecha.value){fecha.classList.add('error');required.push('fecha de reserva');}
    if(pub&&!pub.value.trim()){pub.classList.add('error');required.push('valor de publicación');}
    if(oferta&&!oferta.value.trim()){oferta.classList.add('error');required.push('valor de oferta');}
    if(pago&&!pago.value){pago.classList.add('error');required.push('forma de pago');}
  }
  if(key==='escrituracion'){
    const fecha=document.getElementById('ni-fecha-firma');
    if(fecha&&!fecha.value){fecha.classList.add('error');required.push('fecha de firma');}
  }
  if(key==='referido'){
    const ref=document.getElementById('ni-referidor');
    if(ref&&!ref.value.trim()){ref.classList.add('error');required.push('nombre del referidor');}
  }
  if(key==='modificacion'){
    const va=document.getElementById('ni-valor-anterior');
    const vn=document.getElementById('ni-valor-nuevo');
    if(va&&!va.value.trim()){va.classList.add('error');required.push('valor anterior');}
    if(vn&&!vn.value.trim()){vn.classList.add('error');required.push('valor nuevo');}
  }
  if(required.length>0){toast('Completá: '+required.join(', '));return;}

  const name=nameEl?nameEl.value.trim():'';
  const inst={
    id:'i_'+Date.now(),template:key,name,
    obs:gval('ni-obs'),
    createdAt:Date.now(),createdBy:APP.user?.name||'?',
    completed:false,stepStatus:{}
  };

  if(key==='reserva'){
    const fecha=gval('ni-fecha-reserva');
    const meses=parseInt((document.getElementById('ni-meses-reserva')||{value:'2'}).value)||2;
    inst.fechaReserva=fecha;
    inst.mesesReserva=meses;
    inst.valorPublicacion=gval('ni-valor-pub');
    inst.valorOferta=gval('ni-valor-oferta');
    inst.formaPago=gval('ni-pago');
    if(inst.formaPago==='efectivo')inst.justificaFondos=gval('ni-justifica');
    if(inst.formaPago==='credito'){inst.banco=gval('ni-banco');inst.bancoDir=gval('ni-banco-dir');}
    inst.agenteImplicado=gval('ni-agente');
    if(inst.agenteImplicado==='si'){inst.oficina=gval('ni-oficina');inst.martillero=gval('ni-martillero');}
    inst.compradores=getPartes('compradores');
    if(fecha){
      const venc=new Date(fecha+'T12:00:00');
      venc.setMonth(venc.getMonth()+meses);
      venc.setDate(venc.getDate()-7);
      inst.recordatorioVencimiento=venc.getTime();
    }
  }
  if(key==='escrituracion'){
    const fecha=gval('ni-fecha-firma');
    inst.fechaFirma=fecha;
    inst.horarioFirma=(document.getElementById('ni-horario')||{value:''}).value.trim();
    inst.escribania=gval('ni-escribania');
    inst.escribano=gval('ni-escribano');
    inst.lugarFirma=gval('ni-lugar');
    inst.formaPago=gval('ni-pago-escrit');
    inst.banco=gval('ni-banco-escrit');
    if(fecha){
      const f=new Date(fecha+'T12:00:00');
      const r7=new Date(f);r7.setDate(r7.getDate()-7);
      const r3=new Date(f);r3.setDate(r3.getDate()-3);
      const r1=new Date(f);r1.setDate(r1.getDate()-1);
      inst.recordatorio7=r7.getTime();
      inst.recordatorio3=r3.getTime();
      inst.recordatorio1=r1.getTime();
    }
  }
  if(key==='referido')inst.referidor=gval('ni-referidor');
  if(key==='modificacion'){inst.valorAnterior=gval('ni-valor-anterior');inst.valorNuevo=gval('ni-valor-nuevo');inst.fecha=gval('ni-fecha');}
  if(key==='baja'||key==='renovacion'){inst.fecha=gval('ni-fecha');}

  shared.unshift(inst);
  await saveShared();renderAll();openInst(inst.id);
}

function buildHeaderChips(inst){
  const chips=[];
  if(inst.template==='reserva'){
    if(inst.fechaReserva)chips.push(`<span class="parte-chip">📅 ${fmtDateStr(inst.fechaReserva)}</span>`);
    if(inst.valorPublicacion)chips.push(`<span class="parte-chip">Pub: ${inst.valorPublicacion}</span>`);
    if(inst.valorOferta)chips.push(`<span class="parte-chip">Oferta: ${inst.valorOferta}</span>`);
    if(inst.formaPago){
      const pLabel=inst.formaPago==='efectivo'?`Efectivo${inst.justificaFondos?' (justifica: '+inst.justificaFondos+')':''}`:inst.formaPago==='transferencia'?'Transferencia':`Crédito${inst.banco?' — '+inst.banco:''}${inst.bancoDir?' — '+inst.bancoDir:''}`;
      chips.push(`<span class="parte-chip">${pLabel}</span>`);
    }
    if(inst.agenteImplicado==='si')chips.push(`<span class="parte-chip">🤝 ${inst.oficina||''} ${inst.martillero||''}</span>`);
    if(inst.recordatorioVencimiento){
      const od=inst.recordatorioVencimiento<Date.now();
      chips.push(`<span class="parte-chip" style="color:${od?'var(--red)':'var(--yellow)'}">⏰ Vence ${fmtDate(inst.recordatorioVencimiento+7*24*60*60*1000)}${od?' — VENCIDA':''}</span>`);
    }
    (inst.compradores||[]).forEach(c=>chips.push(`<span class="parte-chip c">C: ${c.nombre}${c.dni?' · '+c.dni:''}</span>`));
  }
  else if(inst.template==='escrituracion'){
    if(inst.fechaFirma)chips.push(`<span class="parte-chip">📅 Firma: ${fmtDateStr(inst.fechaFirma)}${inst.horarioFirma?' '+inst.horarioFirma:''}</span>`);
    if(inst.lugarFirma)chips.push(`<span class="parte-chip">📍 ${inst.lugarFirma}</span>`);
    const now=Date.now();
    if(inst.recordatorio7&&inst.recordatorio7>now)chips.push(`<span class="parte-chip" style="color:var(--yellow)">⏰ 7d: ${fmtDate(inst.recordatorio7)}</span>`);
    if(inst.recordatorio3&&inst.recordatorio3>now)chips.push(`<span class="parte-chip" style="color:var(--yellow)">⏰ 3d: ${fmtDate(inst.recordatorio3)}</span>`);
    if(inst.recordatorio1&&inst.recordatorio1>now)chips.push(`<span class="parte-chip" style="color:var(--yellow)">⏰ 1d: ${fmtDate(inst.recordatorio1)}</span>`);
    if(inst.escribania)chips.push(`<span class="parte-chip">🏛 ${inst.escribania}</span>`);
    if(inst.escribano)chips.push(`<span class="parte-chip">✍️ ${inst.escribano}</span>`);
    (inst.vendedores||[]).forEach(v=>chips.push(`<span class="parte-chip v">V: ${typeof v==='string'?v:(v.nombre||'')+' '+(v.apellido||'')}</span>`));
    (inst.compradores||[]).forEach(c=>chips.push(`<span class="parte-chip c">C: ${typeof c==='string'?c:(c.nombre||'')+' '+(c.apellido||'')}</span>`));
  }
  else if(inst.template==='referido'){
    if(inst.referidor)chips.push(`<span class="parte-chip">👤 Referidor: ${inst.referidor}</span>`);
  }
  else if(inst.template==='modificacion'){
    if(inst.valorAnterior)chips.push(`<span class="parte-chip">Anterior: ${inst.valorAnterior}</span>`);
    if(inst.valorNuevo)chips.push(`<span class="parte-chip" style="color:var(--green)">Nuevo: ${inst.valorNuevo}</span>`);
  }
  else if(inst.template==='captacion'){
    const props=(inst.propietarios||[]);
    props.forEach(p=>chips.push(`<span class="parte-chip v">Prop: ${p.nombre}${p.dni?' · '+p.dni:''}</span>`));
    if(inst.autorizacionVencimiento){
      const od=inst.autorizacionVencimiento<Date.now();
      chips.push(`<span class="parte-chip" style="color:${od?'var(--red)':'var(--yellow)'}">⏰ Autorizacion vence ${fmtDate(inst.autorizacionVencimiento)}${od?' — VENCIDA':''}</span>`);
    }
  }
  return chips.length?`<div class="partes-display">${chips.join('')}</div>`:'';
}

function renderCL(id){
  const inst=shared.find(i=>i.id===id);if(!inst)return;
  const tpl=APP.templates[inst.template];if(!tpl)return;
  const total=totalSteps(tpl),done=doneCount(inst),pct=total>0?Math.round(done/total*100):0,pend=pendCount(inst);
  const badgeHtml=inst.completed?`<span class="badge badge-green">✓ Completado</span>`:pend>0?`<span class="badge badge-yellow">${pend} pendiente${pend>1?'s':''}</span>`:'';
  const extraInfo=buildHeaderChips(inst);
  let html=`<div class="cl-header">
    <div style="display:flex;align-items:center;gap:10px;margin-bottom:8px">
      <span style="font-size:28px">${tpl.icon}</span>
      <div><div class="cl-header-title">${inst.name}</div><div class="cl-header-sub">${tpl.label}${inst.obs?' · '+inst.obs:''} · por ${inst.createdBy||'?'}</div></div>
    </div>
    ${extraInfo}
    <div class="prog-bar" style="height:5px;margin-top:12px"><div class="prog-fill" style="width:${pct}%;background:${tpl.accent}"></div></div>
    <div class="cl-stats">
      <span style="font-size:12px;color:var(--text2)">${done} de ${total} pasos</span>
      ${badgeHtml}
      <button class="btn btn-sm" onclick="editInstHeader('`+id+`')" style="margin-left:4px">✏️ Editar</button>
      ${!inst.completed?
        `<button class="btn btn-sm" onclick="markComplete('`+id+`')" style="margin-left:auto">Marcar completo</button>
        <button class="btn btn-sm" onclick="deleteInst('`+id+`')" style="background:var(--red-bg);color:var(--red);border-color:rgba(224,85,85,0.2)">Eliminar</button>`
        :`<button class="btn btn-sm" onclick="reactivateInst('`+id+`')" style="margin-left:auto">Reactivar</button>`
      }
    </div>
  </div>`;
  let num=1;
  html+=tpl.sections.map(sec=>{
    const sh=sec.steps.map((step,si)=>{
      const key=`${sec.label}__${si}`;
      const st=(inst.stepStatus||{})[key]||{};
      const status=st.status||'none';
      const spid=`sp_${id.slice(-6)}_${sec.label.replace(/\W/g,'').slice(0,8)}_${si}`;
      const snoozeTag=st.snoozeUntil?`<div style="padding:0 14px 6px 48px"><span style="font-size:11px;color:${st.snoozeUntil<Date.now()?'var(--red)':'var(--yellow)'}">⏰ ${st.snoozeUntil<Date.now()?'Vencido — ':''}${fmtDate(st.snoozeUntil)}</span></div>`:'';
      const n=num++;
      const ek=key.replace(/\\/g,'\\\\').replace(/'/g,"\\'");
      // Extra panels for special steps
      const showPropPanel=inst.template==='captacion'&&isPropietariosStep(sec.label,step);
      const showAutPanel=inst.template==='captacion'&&isAutorizacionStep(sec.label,step);
      let extraPanel='';
      if(showPropPanel){
        const props=(inst.propietarios||[]);
        const propHtml=props.map((p,pi)=>`<div style="font-size:12px;color:var(--text2);padding:4px 0">${p.nombre}${p.dni?' · DNI: '+p.dni:''}</div>`).join('');
        extraPanel=`<div class="step-extra-panel${status==='done'?' open':''}" id="${spid}_prop">
          <div class="step-extra-title">Propietarios</div>
          ${propHtml}
          <div id="${spid}_proplist"></div>
          <button class="add-parte-btn" onclick="addPropietario('${id}','${spid}')">+ Agregar propietario</button>
          <button class="btn btn-sm btn-primary" style="margin-top:8px" onclick="savePropietarios('${id}','${spid}')">Guardar</button>
        </div>`;
      }
      if(showAutPanel){
        extraPanel=`<div class="step-extra-panel${status==='done'&&inst.autorizacionVencimiento?'':''}" id="${spid}_aut">
          <div class="step-extra-title">Datos de autorización</div>
          <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:8px">
            <div class="input-wrap" style="margin-bottom:0"><label class="input-label">Fecha de vencimiento</label><input type="date" id="${spid}_autfecha" value="${inst.autorizacionFecha||''}"></div>
            <div class="input-wrap" style="margin-bottom:0"><label class="input-label">Días hábiles pactados</label><input type="number" id="${spid}_autdias" placeholder="Ej: 90" value="${inst.autorizacionDias||''}"></div>
          </div>
          ${inst.autorizacionRecordatorio?`<div class="info-box">Recordatorio: ${fmtDate(inst.autorizacionRecordatorio)}</div>`:''}
          <button class="btn btn-sm btn-primary" onclick="saveAutorizacion('${id}','${spid}')">Guardar y crear recordatorio</button>
        </div>`;
      }
      return`<div class="step-item ${status}">
        <div class="step-main">
          <div class="step-num ${status}">${status==='done'?'✓':status==='skip'?'—':n}</div>
          <div class="step-text${status==='done'?' done':''}">${step}</div>
        </div>
        ${snoozeTag}
        <div class="step-actions">
          <button class="step-act-btn ${status==='done'?'active-done':''}" onclick="setStep('`+id+`','${ek}','done','${spid}',${showAutPanel||showPropPanel})">✓ Hecho</button>
          <button class="step-act-btn ${status==='pending'?'active-pend':''}" onclick="toggleSnooze('${spid}')">⏰ Reprogramar</button>
          <button class="step-act-btn ${status==='skip'?'active-skip':''}" onclick="setStep('`+id+`','${ek}','skip','${spid}',false)">— No aplica</button>
          ${inst.template==='escrituracion'&&isArmarCarpetaStep(sec.label,step)?`<button class="step-act-btn" onclick="openEscritForm('`+id+`')" style="background:var(--blue-bg);color:var(--blue);border-color:rgba(106,176,232,0.3)">📋 ${inst.escrituracionForm?'Ver planilla':'Completar planilla'}</button>`:''}
          ${inst.template==='escrituracion'&&isMensajeClientesStep(step)?'<button class="step-act-btn msg-btn" data-inst="'+id+'" onclick="openMensajeClientes(this.dataset.inst)" style="background:var(--green-bg);color:var(--green);border-color:rgba(76,175,125,0.3)">💬 Ver mensajes</button>':''}
        </div>
        <div class="snooze-panel" id="${spid}">
          <div class="snooze-title">¿Cuándo volvés a este paso?</div>
          <div class="snooze-input-wrap"><input type="number" min="1" max="90" value="${st.snoozeDays||3}" id="${spid}_d" oninput="updatePreview('${spid}')"><span>días hábiles</span></div>
          <div class="snooze-presets">
            <button class="snooze-preset" onclick="setPreset('${spid}',1)">Mañana</button>
            <button class="snooze-preset" onclick="setPreset('${spid}',3)">3 días</button>
            <button class="snooze-preset" onclick="setPreset('${spid}',5)">1 semana</button>
            <button class="snooze-preset" onclick="setPreset('${spid}',10)">2 semanas</button>
            <button class="snooze-preset" onclick="setPreset('${spid}',22)">1 mes</button>
          </div>
          <div class="snooze-date-preview" id="${spid}_p"></div>
          <button class="btn btn-primary btn-sm" onclick="confirmSnooze('${id}','${ek}','${spid}')">Confirmar</button>
        </div>
        ${extraPanel}
        <div class="step-note-area"><input type="text" placeholder="Nota..." value="${(st.note||'').replace(/"/g,'&quot;')}" onchange="setNote('${id}','${ek}',this.value)"></div>
      </div>`;
    }).join('');
    return`<div class="sec-group"><div class="sec-title">${sec.label}</div>${sh}</div>`;
  }).join('');
  document.getElementById('cl-content').innerHTML=html;
  tpl.sections.forEach(sec=>sec.steps.forEach((_,si)=>{
    const spid=`sp_${id.slice(-6)}_${sec.label.replace(/\W/g,'').slice(0,8)}_${si}`;
    updatePreview(spid);
  }));
}

// Propietarios panel
let propTempCounter=0;
function addPropietario(instId,spid){
  propTempCounter++;
  const pid=`prop_${spid}_${propTempCounter}`;
  const div=document.createElement('div');
  div.id='prow_'+pid;
  div.style.cssText='display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:8px';
  div.innerHTML=`<input type="text" id="${pid}_n" placeholder="Nombre"><input type="text" id="${pid}_d" placeholder="DNI">`;
  document.getElementById(spid+'_proplist').appendChild(div);
}
async function savePropietarios(instId,spid){
  const inst=shared.find(i=>i.id===instId);if(!inst)return;
  const rows=document.getElementById(spid+'_proplist').querySelectorAll('[id^="prow_"]');
  const props=[...(inst.propietarios||[])];
  rows.forEach(row=>{
    const pid=row.id.replace('prow_','');
    const n=(document.getElementById(pid+'_n')||{value:''}).value.trim();
    const d=(document.getElementById(pid+'_d')||{value:''}).value.trim();
    if(n)props.push({nombre:n,dni:d});
  });
  inst.propietarios=props;
  await saveShared();toast('Propietarios guardados');renderCL(instId);
}

// Autorizacion panel
async function saveAutorizacion(instId,spid){
  const inst=shared.find(i=>i.id===instId);if(!inst)return;
  const fecha=(document.getElementById(spid+'_autfecha')||{value:''}).value;
  const dias=parseInt((document.getElementById(spid+'_autdias')||{value:'90'}).value)||90;
  inst.autorizacionFecha=fecha;
  inst.autorizacionDias=dias;
  if(fecha){
    const aviso=new Date(fecha+'T12:00:00');
    aviso.setDate(aviso.getDate()-7);
    inst.autorizacionRecordatorio=aviso.getTime();
    inst.autorizacionVencimiento=new Date(fecha+'T12:00:00').getTime();
    toast(`Recordatorio: ${fmtDate(aviso.getTime())}`);
  }
  await saveShared();renderCL(instId);renderReminders();updateTopbar();
}

function toggleSnooze(spid){
  const p=document.getElementById(spid);if(!p)return;
  const open=p.classList.contains('open');
  document.querySelectorAll('.snooze-panel.open').forEach(e=>e.classList.remove('open'));
  if(!open){p.classList.add('open');updatePreview(spid);}
}
function setPreset(spid,days){const i=document.getElementById(spid+'_d');if(i){i.value=days;updatePreview(spid);}}
function updatePreview(spid){
  const i=document.getElementById(spid+'_d');const p=document.getElementById(spid+'_p');
  if(!i||!p)return;
  const days=parseInt(i.value)||1;
  const t=addBizDays(new Date(),days);
  const dow=['domingo','lunes','martes','miércoles','jueves','viernes','sábado'][t.getDay()];
  p.textContent=`→ ${dow} ${t.getDate()}/${t.getMonth()+1}/${t.getFullYear()}`;
}
async function confirmSnooze(instId,key,spid){
  const i=document.getElementById(spid+'_d');
  const days=parseInt(i?.value)||3;
  const until=addBizDays(new Date(),days).getTime();
  const inst=shared.find(i=>i.id===instId);
  if(!inst.stepStatus)inst.stepStatus={};
  inst.stepStatus[key]={...(inst.stepStatus[key]||{}),status:'pending',snoozeUntil:until,snoozeDays:days};
  await saveShared();
  document.getElementById(spid)?.classList.remove('open');
  toast('Recordatorio: '+fmtDate(until));
  renderCL(instId);renderActive();renderReminders();updateTopbar();
}
async function setStep(instId,key,status,spid,showExtra){
  const inst=shared.find(i=>i.id===instId);
  if(!inst.stepStatus)inst.stepStatus={};
  const cur=inst.stepStatus[key]||{};
  const ns=cur.status===status?'none':status;
  inst.stepStatus[key]={...cur,status:ns};
  if(ns==='done'){inst.stepStatus[key].snoozeUntil=null;inst.stepStatus[key].snoozeDays=null;}
  checkCompletion(inst);
  await saveShared();
  renderCL(instId);renderActive();renderReminders();updateTopbar();
  // Open extra panel if marking done
  if(ns==='done'&&showExtra){
    setTimeout(()=>{
      const autEl=document.getElementById(spid+'_aut');
      const propEl=document.getElementById(spid+'_prop');
      if(autEl)autEl.classList.add('open');
      if(propEl)propEl.classList.add('open');
    },200);
  }
  // Open escrituracion form if marking carpeta fer step
  const inst2=shared.find(i=>i.id===instId);
  if(inst2&&inst2.template==='escrituracion'){
    const tpl2=APP.templates['escrituracion'];
    if(tpl2){
      let stepText='';
      tpl2.sections.forEach(sec=>sec.steps.forEach((s,si)=>{if(`${sec.label}__${si}`===key)stepText=s;}));
      if(isArmarCarpetaStep('',stepText)&&ns==='done'){
        setTimeout(()=>openEscritForm(instId),300);
      }
    }
  }
}
async function setNote(instId,key,note){
  const inst=shared.find(i=>i.id===instId);
  if(!inst.stepStatus)inst.stepStatus={};
  inst.stepStatus[key]={...(inst.stepStatus[key]||{}),note};
  await saveShared();
}
async function markComplete(instId){
  const inst=shared.find(i=>i.id===instId);
  inst.completed=true;inst.completedAt=Date.now();
  await saveShared();toast('¡Proceso completado! Pasó a "Anteriores".');
  renderCL(instId);renderAll();
}
function checkCompletion(inst){
  const tpl=APP.templates[inst.template];if(!tpl)return;
  if(doneCount(inst)>=totalSteps(tpl)){inst.completed=true;inst.completedAt=Date.now();}
}
function showTab(tab){
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.querySelectorAll('.bnav-btn').forEach(b=>b.classList.remove('active'));
  document.getElementById('screen-'+tab).classList.add('active');
  // Update both bottom nav and top nav
  const bnavBtn=document.getElementById('bnav-'+tab);
  if(bnavBtn)bnavBtn.classList.add('active');
  const tnavBtn=document.getElementById('tnav-'+tab);
  if(tnavBtn)tnavBtn.classList.add('active');
  document.getElementById('topbar-back-btn').style.display='none';
  if(tab==='active')renderActive();
  if(tab==='reminders')renderReminders();
  if(tab==='prev')renderPrev();
}

function showScreen(id){
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.getElementById('screen-'+id).classList.add('active');
  // Show back button when not on main tabs
  const isMainTab=['home','active','reminders','prev'].includes(id);
  document.getElementById('topbar-back-btn').style.display=isMainTab?'none':'block';
}

function handleTopBack(){
  goBack();
}

function goBack(){renderActive();showTab(APP.prevTab||'home');}
function toast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2800);}

// ENTER KEY NAVIGATION - moves to next input/select on Enter
document.addEventListener('keydown', function(e){
  if(e.key !== 'Enter') return;
  const tag = e.target.tagName.toLowerCase();
  if(tag !== 'input' && tag !== 'select') return;
  // Don't intercept if it's a textarea or button
  e.preventDefault();
  // Find all focusable inputs in current form/modal
  const container = e.target.closest('.modal-box, .new-form, .screen.active') || document;
  const inputs = Array.from(container.querySelectorAll('input:not([type=hidden]):not([disabled]), select:not([disabled])'));
  const idx = inputs.indexOf(e.target);
  if(idx >= 0 && idx < inputs.length - 1){
    inputs[idx + 1].focus();
    // If it's a select, open it
    if(inputs[idx+1].tagName.toLowerCase() === 'select'){
      // just focus, don't open
    }
  }
});
